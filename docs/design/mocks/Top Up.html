<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Top up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-hot:#7fd0ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .phone-root{
    width:402px;height:874px;position:relative;overflow:hidden;
    background:radial-gradient(900px 700px at 50% 0%, #141720 0%, var(--bg) 70%);
    color:var(--ink);
  }

  /* Header */
  .hdr{
    position:relative; z-index:2;
    padding:56px 18px 6px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .hdr .ttl{
    font:600 20px/1 var(--sans); letter-spacing:-0.01em;
    position:absolute; left:50%; transform:translateX(-50%); top:58px;
  }
  .iconbtn{
    width:36px;height:36px;border-radius:50%; border:1px solid var(--line); background:var(--panel);
    color:var(--ink); display:grid; place-items:center; backdrop-filter:blur(10px);
    cursor:pointer; transition:transform .18s;
  }
  .iconbtn:active{ transform:scale(0.94) }

  /* Scroll body */
  .scroll{
    position:absolute; inset:106px 0 112px 0; z-index:2;
    overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
    padding:0 0 20px;
  }
  .scroll::-webkit-scrollbar{display:none}

  /* Context strip — current balance */
  .context{
    margin:6px 18px 14px;
    padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    border-radius:18px;
    background:
      radial-gradient(120% 80% at 100% -10%, rgba(62,167,255,0.12), transparent 70%),
      linear-gradient(180deg, rgba(20,22,26,0.85), rgba(14,16,20,0.85));
    border:1px solid var(--line-2);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  }
  .context .lab{
    font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .context .amt{
    font:600 22px/1 var(--sans); letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums; color:var(--ink);
    display:flex; align-items:center; gap:7px; margin-top:4px;
  }
  .context .glyph{ color:var(--accent); display:inline-grid; place-items:center }
  .context .usd{
    font:500 11px var(--mono); color:var(--ink-dim); letter-spacing:0.08em; margin-top:4px;
  }
  .context .right{ text-align:right }
  .context .rate{
    font:500 9.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .context .rate-val{
    margin-top:4px; font:500 12px var(--mono); color:var(--ink-dim); letter-spacing:0.04em;
  }

  /* Section */
  .sec-head{
    padding:4px 18px 10px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .sec-head .l{
    font:500 10.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .sec-head .r{
    font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.12em;
  }

  /* Bundles list */
  .bundles{ padding:0 18px; display:flex; flex-direction:column; gap:10px }

  .bundle{
    position:relative;
    display:grid; grid-template-columns:44px 1fr auto; align-items:center; gap:14px;
    padding:16px 16px 16px 14px;
    border-radius:18px;
    background:var(--panel);
    border:1px solid var(--line);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    cursor:pointer; text-align:left;
    color:var(--ink);
    font-family:var(--sans);
    transition:border-color .22s cubic-bezier(.4,1.4,.6,1), background .22s, transform .18s, box-shadow .22s;
  }
  .bundle:active{ transform:scale(0.99) }

  /* Radio bullet */
  .bundle .pick{
    width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--line-2);
    display:grid; place-items:center;
    transition:border-color .2s, background .2s;
  }
  .bundle .pick .in{
    width:0;height:0;border-radius:50%; background:var(--accent);
    transition:width .22s cubic-bezier(.4,1.4,.6,1), height .22s cubic-bezier(.4,1.4,.6,1);
  }

  /* Selected row */
  .bundle[aria-pressed="true"]{
    border-color:rgba(62,167,255,0.55);
    background:
      radial-gradient(110% 120% at 0% 0%, rgba(62,167,255,0.14), transparent 60%),
      rgba(20,22,26,0.82);
    box-shadow:0 0 30px rgba(62,167,255,0.18);
  }
  .bundle[aria-pressed="true"] .pick{
    border-color:var(--accent);
    background:rgba(62,167,255,0.12);
  }
  .bundle[aria-pressed="true"] .pick .in{ width:10px; height:10px }

  /* Body */
  .bundle .body{ display:flex; flex-direction:column; gap:5px; min-width:0 }
  .bundle .row1{ display:flex; align-items:center; gap:8px; }
  .bundle .glyph{
    width:18px; height:18px;
    display:inline-grid; place-items:center;
    color:var(--accent);
  }
  .bundle .qty{
    font:600 20px/1 var(--sans); letter-spacing:-0.01em;
    font-variant-numeric:tabular-nums;
  }
  .bundle .unit{
    font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .bundle .meta{
    font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.12em;
  }
  .bundle .meta b{ color:var(--ink-dim); font-weight:500 }

  /* Price pill */
  .bundle .price{
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
    min-width:72px;
  }
  .bundle .usd{
    font:600 17px/1 var(--sans); letter-spacing:-0.01em;
    font-variant-numeric:tabular-nums;
    color:var(--ink);
  }
  .bundle .per{
    font:500 9px var(--mono); color:var(--ink-faint); letter-spacing:0.12em;
  }

  /* Corner badge */
  .badge{
    position:absolute; top:-7px; right:14px;
    padding:3px 7px 3px 7px; border-radius:4px;
    font:600 8.5px var(--mono); letter-spacing:0.14em;
    color:#0a0c10; background:var(--accent); border:1px solid var(--accent);
    display:inline-flex; align-items:center; gap:5px;
  }
  .badge[data-tone="hot"]{
    background:var(--accent-hot); border-color:var(--accent-hot);
  }
  .badge[data-tone="vip"]{
    background:var(--ink); border-color:var(--ink);
  }

  /* Savings chip (inline next to rate) */
  .save{
    display:inline-flex; align-items:center;
    padding:1px 5px; border-radius:3px;
    font:600 8.5px var(--mono); letter-spacing:0.12em;
    color:var(--accent); background:rgba(62,167,255,0.12);
    border:1px solid rgba(62,167,255,0.3);
    margin-left:6px;
  }

  /* Footer receipt note */
  .foot-note{
    padding:18px 22px 8px;
    text-align:center;
    font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.08em;
    line-height:1.6;
  }
  .foot-note a{
    color:var(--ink-dim); text-decoration:none;
    border-bottom:1px solid var(--line-2);
    padding-bottom:1px;
  }
  .foot-note .sep{ opacity:0.4; margin:0 6px }

  /* Bottom CTA bar */
  .cta-bar{
    position:absolute; left:0; right:0; bottom:0; z-index:40;
    padding:10px 14px 30px;
    background:
      linear-gradient(180deg, rgba(7,8,9,0), rgba(7,8,9,0.92) 28%, var(--bg) 60%);
    display:flex; flex-direction:column; gap:8px;
    pointer-events:none;
  }
  .cta-bar > *{ pointer-events:auto }

  .cta{
    height:64px; width:100%;
    border-radius:20px; border:0;
    background:var(--accent); color:#0a0c10;
    font:600 16px var(--sans); letter-spacing:-0.01em;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px 0 22px;
    cursor:pointer; transition:transform .18s, box-shadow .2s;
    box-shadow:0 0 30px rgba(62,167,255,0.2);
  }
  .cta:active{ transform:scale(0.985) }
  .cta .l{ display:flex; align-items:center; gap:10px }
  .cta .l .glyph{ display:inline-grid; place-items:center }
  .cta .r{ font:500 15px var(--mono); letter-spacing:-0.01em; font-variant-numeric:tabular-nums }

  .apple-note{
    text-align:center;
    font:500 9.5px var(--mono); color:var(--ink-faint); letter-spacing:0.12em;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .apple-note svg{ opacity:0.7 }
</style>
</head>
<body>
<div id="outer" style="width:100%;height:100%;display:grid;place-items:center"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  // ── Inline phone frame (same as Wallet) ─────────────────────────
  function IOSStatusBar({ dark=true }){
    const c = dark ? '#fff' : '#000';
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'21px 34px 19px',width:'100%',boxSizing:'border-box'}}>
        <span style={{fontFamily:'-apple-system,system-ui',fontWeight:590,fontSize:17,color:c}}>9:41</span>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
        </div>
      </div>
    );
  }
  function IOSDevice({ children, width=402, height=874 }){
    return (
      <div style={{
        width,height,borderRadius:48,overflow:'hidden',position:'relative',
        background:'#000', boxShadow:'0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)',
        fontFamily:'-apple-system,system-ui,sans-serif'
      }}>
        <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10}}><IOSStatusBar dark/></div>
        <div style={{position:'absolute',inset:0}}>{children}</div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,0.7)'}}/>
        </div>
      </div>
    );
  }
  function fitPhone(){
    const vh=window.innerHeight, vw=window.innerWidth;
    return Math.min(vw/(402+40), vh/(874+40), 1);
  }
  function Shell({children}){
    const [s,setS] = React.useState(fitPhone());
    React.useEffect(()=>{ const on=()=>setS(fitPhone()); window.addEventListener('resize',on); return ()=>window.removeEventListener('resize',on); },[]);
    return <div style={{transform:`scale(${s})`, transformOrigin:'center'}}><IOSDevice>{children}</IOSDevice></div>;
  }

  // ── Glyph ───────────────────────────────────────────────────────
  const Token = ({ size=18 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2 L13.8 9.2 L21 11 L13.8 12.8 L12 20 L10.2 12.8 L3 11 L10.2 9.2 Z"/>
    </svg>
  );
  const Back = (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  );
  const Lock = (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="4" y="11" width="16" height="10" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>
  );
  const Apple = (
    <svg width="11" height="13" viewBox="0 0 24 28" fill="currentColor">
      <path d="M19.3 21.5c-.9 2-2 4-3.7 4-1.5 0-2-.9-3.8-.9-1.7 0-2.4.9-3.8.9-1.7 0-3-1.9-3.9-3.8-1.8-3.6-3.2-10.4 1.3-15 1.5-1.6 3.2-2.5 4.8-2.5 1.5 0 2.4.9 3.6.9 1.2 0 1.9-.9 3.7-.9 1.4 0 2.9.8 4 2.1-3.5 1.9-2.9 6.9.8 8.4-.5 1.5-1.1 3-2.5 6.8-.1 0-.2 0-.5 0zM14.8 0c.2 2.2-.9 4.4-2.1 5.7-1.3 1.4-3.3 2.5-5.2 2.4-.2-2.1 1-4.4 2.2-5.6 1.2-1.4 3.4-2.4 5.1-2.5z"/>
    </svg>
  );

  // ── Bundles ─────────────────────────────────────────────────────
  const TOKEN_BAL = 14280;
  const TOKEN_USD = 0.01;

  const BUNDLES = [
    { id:'tok_100',  qty:100,   price:0.99,  badge:null },
    { id:'tok_550',  qty:550,   price:4.99,  badge:{ label:'BEST VALUE',   tone:'default' } },
    { id:'tok_1200', qty:1200,  price:9.99,  badge:{ label:'MOST POPULAR', tone:'hot'     } },
    { id:'tok_3500', qty:3500,  price:24.99, badge:{ label:'VIP',          tone:'vip'     } },
  ];

  // Baseline rate = smallest bundle's $ / token
  const base = BUNDLES[0];
  const baseRate = base.price / base.qty; // $0.0099 per token

  const perToken = b => b.price / b.qty;
  const savingsPct = b => {
    const pct = (1 - perToken(b) / baseRate) * 100;
    return pct >= 1 ? Math.round(pct) : 0;
  };

  // ── Screen ──────────────────────────────────────────────────────
  function TopUp(){
    const [sel, setSel] = React.useState('tok_1200'); // default to popular
    const picked = BUNDLES.find(b => b.id===sel);

    return (
      <div className="phone-root">
        <div className="hdr">
          <button className="iconbtn" aria-label="Back">{Back}</button>
          <div className="ttl">Top up</div>
          <div style={{width:36}}/>
        </div>

        <div className="scroll">
          {/* Current balance context strip */}
          <div className="context">
            <div>
              <div className="lab">CURRENT BALANCE</div>
              <div className="amt">
                <span className="glyph"><Token size={18}/></span>
                {TOKEN_BAL.toLocaleString('en-US')}
              </div>
              <div className="usd">≈ ${(TOKEN_BAL*TOKEN_USD).toFixed(2)} USD</div>
            </div>
            <div className="right">
              <div className="rate">RATE</div>
              <div className="rate-val">$0.01 / tok</div>
            </div>
          </div>

          <div className="sec-head">
            <span className="l">CHOOSE BUNDLE</span>
            <span className="r">4 OPTIONS</span>
          </div>

          <div className="bundles">
            {BUNDLES.map(b => {
              const save = savingsPct(b);
              return (
                <button
                  key={b.id}
                  className="bundle"
                  aria-pressed={sel===b.id}
                  onClick={() => setSel(b.id)}
                >
                  {b.badge && (
                    <span className="badge" data-tone={b.badge.tone}>{b.badge.label}</span>
                  )}
                  <span className="pick"><span className="in"/></span>
                  <div className="body">
                    <div className="row1">
                      <span className="glyph"><Token size={16}/></span>
                      <span className="qty">{b.qty.toLocaleString('en-US')}</span>
                      <span className="unit">TOKENS</span>
                    </div>
                    <div className="meta">
                      <b>${perToken(b).toFixed(4)}</b> / TOKEN
                      {save > 0 && <span className="save">SAVE {save}%</span>}
                    </div>
                  </div>
                  <div className="price">
                    <span className="usd">${b.price.toFixed(2)}</span>
                    <span className="per">USD</span>
                  </div>
                </button>
              );
            })}
          </div>

          <div className="foot-note">
            Charged to your Apple ID on confirm.
            <br/>
            <a href="#">Terms</a><span className="sep">·</span>
            <a href="#">Privacy</a><span className="sep">·</span>
            <a href="#">Restore purchase</a>
          </div>
        </div>

        {/* Bottom CTA */}
        <div className="cta-bar">
          <button className="cta">
            <span className="l">
              <span className="glyph"><Token size={18}/></span>
              Buy {picked.qty.toLocaleString('en-US')} tokens
            </span>
            <span className="r">${picked.price.toFixed(2)}</span>
          </button>
          <div className="apple-note">
            {Lock} SECURE CHECKOUT {Apple} APP STORE
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('outer')).render(
    <Shell><TopUp/></Shell>
  );
</script>
</body>
</html>
