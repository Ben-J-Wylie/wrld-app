<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Report</title>
<style>
  /* Tokens */
  @import url("https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");
  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-hot:#7fd0ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .phone-root{
    width:402px; height:874px; position:relative; overflow:hidden;
    background:#000; color:var(--ink);
  }

  /* ── Underlying context: a faint version of the broadcast we're reporting ── */
  .ctx{
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 80% at 30% 80%, rgba(255,160,90,0.18), transparent 60%),
      radial-gradient(40% 50% at 80% 30%, rgba(62,167,255,0.18), transparent 70%),
      linear-gradient(180deg, #1a1410, #0a0a0c);
    filter:blur(0.5px);
  }
  .ctx-strip{
    position:absolute; left:18px; right:18px; top:120px; z-index:1;
    padding:14px 16px; border-radius:16px;
    background:var(--panel); border:1px solid var(--line);
    backdrop-filter:blur(12px);
    display:flex; align-items:center; gap:12px;
  }
  .ctx-thumb{
    width:48px; height:48px; border-radius:10px;
    background:radial-gradient(60% 80% at 30% 80%, rgba(255,160,90,0.5), transparent 60%), #1a1410;
    border:1px solid var(--line);
    flex:none;
  }
  .ctx-strip .col{ display:flex; flex-direction:column; gap:3px; min-width:0 }
  .ctx-strip .l{ font:500 12px var(--sans); color:var(--ink); 
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:240px }
  .ctx-strip .s{ font:500 9.5px var(--mono); color:var(--ink-dim); letter-spacing:0.1em }
  .ctx-strip .live{
    display:inline-flex; align-items:center; gap:5px;
    margin-left:auto; flex:none;
    padding:3px 7px 3px 5px; border-radius:5px;
    background:var(--live); color:#fff;
    font:600 8px var(--mono); letter-spacing:0.16em;
  }
  .ctx-strip .live .sq{ width:6px; height:6px; border-radius:1px; background:#fff }

  /* ── Scrim under modal ── */
  .scrim{
    position:absolute; inset:0; z-index:10;
    background:rgba(0,0,0,0.65);
    opacity:0; transition:opacity .25s;
  }
  .scrim[data-open="true"]{ opacity:1 }

  /* ── Modal sheet ── */
  .modal{
    position:absolute; left:8px; right:8px; bottom:14px; z-index:20;
    border-radius:26px; overflow:hidden;
    background:#0e1116; border:1px solid var(--line-2);
    transform:translateY(20px); opacity:0; pointer-events:none;
    transition:transform .3s cubic-bezier(.4,1.4,.6,1), opacity .25s;
    display:flex; flex-direction:column;
    max-height:calc(100% - 100px);
  }
  .modal[data-open="true"]{ transform:translateY(0); opacity:1; pointer-events:auto }

  /* Header */
  .mhead{
    flex:none;
    padding:18px 18px 14px;
    display:grid; grid-template-columns:32px 1fr 32px;
    align-items:center; gap:12px;
    border-bottom:1px solid var(--line);
  }
  .mhead .back{
    width:32px; height:32px; border-radius:999px;
    background:transparent; border:1px solid var(--line);
    color:var(--ink-dim); cursor:pointer;
    display:grid; place-items:center;
    transition:opacity .2s, border-color .2s;
    font-family:var(--sans);
  }
  .mhead .back[data-hidden="true"]{ visibility:hidden }
  .mhead .x{
    width:32px; height:32px; border-radius:999px;
    background:transparent; border:0; color:var(--ink-dim);
    cursor:pointer; display:grid; place-items:center;
    font-family:var(--sans);
  }
  .mhead .title{
    font:600 15px var(--sans); letter-spacing:-0.005em; color:var(--ink);
    text-align:center;
  }
  .mhead .step{
    font:500 9.5px var(--mono); letter-spacing:0.16em; color:var(--ink-faint);
    text-align:center; margin-top:2px;
  }

  /* Body — scrollable */
  .mbody{
    flex:1 1 auto; min-height:0;
    overflow-y:auto; overflow-x:hidden;
    scrollbar-width:none;
  }
  .mbody::-webkit-scrollbar{display:none}

  /* Step intro */
  .lede{
    padding:18px 18px 8px;
    font:500 13px/1.5 var(--sans); color:var(--ink-dim); text-wrap:pretty;
  }

  /* Reason rows */
  .reasons{ padding:6px 12px 14px }
  .reason{
    width:100%; text-align:left;
    display:grid; grid-template-columns:1fr 18px; align-items:center; gap:14px;
    padding:14px 12px; margin:2px 0;
    border-radius:14px;
    background:transparent; border:1px solid transparent;
    color:var(--ink); cursor:pointer;
    transition:background .2s, border-color .2s;
    font-family:var(--sans);
  }
  .reason:hover{ background:rgba(255,255,255,0.02) }
  .reason[data-sel="true"]{ background:rgba(62,167,255,0.07); border-color:rgba(62,167,255,0.32) }
  .reason .l{ display:flex; flex-direction:column; gap:3px }
  .reason .l .t{ font:500 14px var(--sans); color:var(--ink); letter-spacing:-0.005em }
  .reason .l .d{ font:500 11px var(--mono); color:var(--ink-dim); letter-spacing:0.04em; text-wrap:pretty;
    line-height:1.45 }
  .reason .chev{ color:var(--ink-faint) }
  .reason[data-sel="true"] .chev{ color:var(--accent) }

  /* Step 2 — sub-options as chips */
  .chiplist{
    padding:8px 18px 14px;
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .chip{
    padding:9px 14px; border-radius:999px;
    background:transparent; border:1px solid var(--line-2);
    color:var(--ink-dim);
    font:500 12px var(--sans); cursor:pointer;
    transition:all .18s;
    font-family:var(--sans);
  }
  .chip[data-sel="true"]{
    border-color:var(--accent); background:rgba(62,167,255,0.1); color:var(--ink);
  }

  /* Step 3 — context details */
  .field{ padding:0 18px 14px }
  .field label{
    display:block; font:500 10.5px var(--mono); color:var(--ink-faint);
    letter-spacing:0.14em; margin-bottom:8px;
  }
  textarea.note{
    width:100%; min-height:96px; resize:vertical;
    padding:12px 14px; border-radius:14px;
    background:var(--panel-solid); border:1px solid var(--line);
    color:var(--ink); font:500 14px/1.5 var(--sans);
    outline:none; transition:border-color .2s;
  }
  textarea.note:focus{ border-color:rgba(62,167,255,0.5) }
  textarea.note::placeholder{ color:var(--ink-faint) }

  .togglerow{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; margin:0 0 10px;
  }
  .togglerow + .togglerow{ border-top:1px solid var(--line) }
  .togglerow .col{ display:flex; flex-direction:column; gap:3px; min-width:0; flex:1; padding-right:14px }
  .togglerow .t{ font:500 14px var(--sans); color:var(--ink); letter-spacing:-0.005em }
  .togglerow .d{ font:500 11px var(--mono); color:var(--ink-dim); letter-spacing:0.04em; text-wrap:pretty; line-height:1.45 }
  .toggle{
    width:44px; height:26px; border-radius:999px;
    background:#2a2e35; border:0; padding:0; flex:none;
    position:relative; cursor:pointer;
    transition:background .22s cubic-bezier(.4,1.4,.6,1);
    font-family:var(--sans);
  }
  .toggle::after{
    content:""; position:absolute; top:3px; left:3px;
    width:20px; height:20px; border-radius:50%;
    background:var(--ink);
    transition:transform .22s cubic-bezier(.4,1.4,.6,1), background .22s;
  }
  .toggle[data-on="true"]{ background:var(--accent) }
  .toggle[data-on="true"]::after{ transform:translateX(18px); background:#fff }

  /* Privacy note */
  .privacy{
    margin:8px 18px 18px;
    padding:12px 14px; border-radius:12px;
    background:rgba(62,167,255,0.06); border:1px solid rgba(62,167,255,0.18);
    display:flex; gap:10px; align-items:flex-start;
  }
  .privacy .ic{ color:var(--accent); flex:none; margin-top:1px }
  .privacy p{
    margin:0; font:500 11.5px/1.5 var(--sans); color:var(--ink-dim); text-wrap:pretty;
  }
  .privacy b{ color:var(--ink); font-weight:500 }

  /* Step 4 — confirmation */
  .done-wrap{
    padding:32px 24px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .done-ring{
    width:72px; height:72px; border-radius:50%;
    background:rgba(62,167,255,0.1);
    border:1px solid rgba(62,167,255,0.4);
    display:grid; place-items:center;
    color:var(--accent);
    box-shadow:0 0 30px rgba(62,167,255,0.2);
  }
  .done-h{
    font:600 22px/1.2 var(--sans); letter-spacing:-0.02em; color:var(--ink);
  }
  .done-p{
    font:500 13px/1.55 var(--sans); color:var(--ink-dim); text-wrap:pretty; max-width:300px;
  }
  .done-receipt{
    margin-top:12px;
    padding:10px 14px; border-radius:10px;
    background:var(--panel-solid); border:1px solid var(--line);
    font:500 10.5px var(--mono); color:var(--ink-dim); letter-spacing:0.1em;
  }
  .done-receipt b{ color:var(--ink); font-weight:500 }
  .done-actions{
    margin-top:8px; display:flex; flex-direction:column; gap:8px; width:100%;
  }
  .done-secondary{
    padding:11px 14px; border-radius:10px;
    background:transparent; border:1px solid var(--line);
    color:var(--ink-dim); cursor:pointer;
    font:500 12px var(--sans); letter-spacing:-0.005em;
    transition:color .2s, border-color .2s;
    font-family:var(--sans);
  }
  .done-secondary:hover{ color:var(--ink); border-color:var(--line-2) }

  /* Footer / CTA */
  .mfoot{
    flex:none;
    padding:14px 14px calc(14px + env(safe-area-inset-bottom, 0px));
    border-top:1px solid var(--line);
    display:grid; grid-template-columns:1fr;
  }
  .submit{
    height:48px; border-radius:14px; border:0;
    background:var(--accent); color:#0a0c10;
    font:600 14px var(--sans); letter-spacing:-0.005em;
    cursor:pointer; transition:opacity .2s, transform .18s;
    box-shadow:0 0 28px rgba(62,167,255,0.16);
    font-family:var(--sans);
  }
  .submit:active{ transform:scale(0.98) }
  .submit[disabled]{
    opacity:0.35; cursor:not-allowed; box-shadow:none;
  }
  .submit[data-tone="warn"]{
    background:var(--live); color:#fff;
    box-shadow:0 0 28px rgba(255,77,77,0.22);
  }

  /* Step indicator */
  .stepbar{
    flex:none;
    padding:0 18px 14px;
    display:flex; gap:6px;
  }
  .stepbar span{
    flex:1; height:3px; border-radius:999px;
    background:var(--line);
    transition:background .25s;
  }
  .stepbar span[data-on="true"]{ background:var(--accent) }
</style>
</head>
<body>
<div id="outer" style="width:100%;height:100%;display:grid;place-items:center"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  // ── Inline phone frame ──
  function IOSStatusBar(){
    const c = '#fff';
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'21px 34px 19px',width:'100%',boxSizing:'border-box'}}>
        <span style={{fontFamily:'-apple-system,system-ui',fontWeight:590,fontSize:17,color:c}}>9:41</span>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
        </div>
      </div>
    );
  }
  function IOSDevice({ children }){
    return (
      <div style={{width:402,height:874,borderRadius:48,overflow:'hidden',position:'relative',background:'#000',boxShadow:'0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)',fontFamily:'-apple-system,system-ui,sans-serif'}}>
        <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10}}><IOSStatusBar/></div>
        <div style={{position:'absolute',inset:0}}>{children}</div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,0.7)'}}/>
        </div>
      </div>
    );
  }
  function Shell({ children }){
    const fit = () => {
      const vh = window.innerHeight, vw = window.innerWidth;
      return Math.min(vw/(402+40), vh/(874+40), 1);
    };
    const [s, setS] = React.useState(fit());
    React.useEffect(() => {
      const on = () => setS(fit());
      window.addEventListener("resize", on);
      return () => window.removeEventListener("resize", on);
    }, []);
    return (
      <div style={{transform:`scale(${s})`,transformOrigin:"center"}}>
        <IOSDevice>{children}</IOSDevice>
      </div>
    );
  }

  // ── Icons ──
  const I = {
    back:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
    x:     <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
    chev:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>,
    check: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>,
    info:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>,
  };

  // ── Reasons taxonomy ──
  // Top-level reasons. Each opens a sub-step with chips for specifics.
  const REASONS = [
    {
      id:'safety',
      t:'Safety risk',
      d:'Live broadcast may put someone in danger.',
      subs:[
        'Imminent harm to broadcaster',
        'Imminent harm to others',
        'Stalking or doxxing',
        'Active crime in progress',
      ],
      tone:'warn',
    },
    {
      id:'graphic',
      t:'Graphic or violent content',
      d:'Gore, animal cruelty, sexual violence, self-harm.',
      subs:[
        'Self-harm or suicide',
        'Graphic violence',
        'Sexual violence',
        'Animal cruelty',
      ],
      tone:'warn',
    },
    {
      id:'minor',
      t:'Minor / underage broadcaster',
      d:'Person broadcasting appears to be under 18.',
      subs:['Unsupervised minor', 'Sexualized content involving minor'],
      tone:'warn',
    },
    {
      id:'private',
      t:'Private location or person',
      d:'Filming inside a private residence, or a person without consent.',
      subs:[
        'Inside private residence',
        'Identifiable person without consent',
        'Showing my address / location',
        'Showing personal documents',
      ],
    },
    {
      id:'misinfo',
      t:'Misleading or fake',
      d:'Pre-recorded clip, deepfake, or wrong location.',
      subs:[
        'Pre-recorded (not actually live)',
        'Wrong location pin',
        'AI-generated / deepfake',
        'Impersonation',
      ],
    },
    {
      id:'spam',
      t:'Spam or scam',
      d:'Promotional, repeat content, or attempting to scam viewers.',
      subs:['Spam / promotional', 'Scam attempt', 'Off-topic for channel'],
    },
    {
      id:'hate',
      t:'Hate or harassment',
      d:'Targeted abuse based on identity, or threats.',
      subs:[
        'Slurs or hate speech',
        'Targeted harassment',
        'Threats of violence',
      ],
    },
    {
      id:'other',
      t:'Something else',
      d:"Doesn't fit the categories above.",
      subs:[],
    },
  ];

  function StepBar({ step, total }){
    return (
      <div className="stepbar">
        {Array.from({length:total}).map((_,i)=>(
          <span key={i} data-on={i < step}/>
        ))}
      </div>
    );
  }

  function ReasonRow({ r, sel, onClick }){
    return (
      <button className="reason" data-sel={sel} onClick={onClick}>
        <span className="l">
          <span className="t">{r.t}</span>
          <span className="d">{r.d}</span>
        </span>
        <span className="chev">{I.chev}</span>
      </button>
    );
  }

  function ReportModal({ open, onClose }){
    const [step, setStep] = React.useState(1); // 1..4
    const [reason, setReason] = React.useState(null);
    const [subSel, setSubSel] = React.useState([]); // multi-select chips
    const [note, setNote]     = React.useState('');
    const [hide, setHide]     = React.useState(true);
    const [block, setBlock]   = React.useState(false);

    const reset = () => {
      setStep(1); setReason(null); setSubSel([]); setNote(''); setHide(true); setBlock(false);
    };
    const close = () => { onClose(); setTimeout(reset, 320); };

    const toggleSub = (s) => {
      setSubSel(v => v.includes(s) ? v.filter(x=>x!==s) : [...v, s]);
    };

    // Step navigation: skip step 2 if reason has no sub-options.
    const next = () => {
      if(step === 1){
        if(!reason) return;
        if(reason.subs.length === 0) setStep(3);
        else setStep(2);
      } else if(step === 2){
        setStep(3);
      } else if(step === 3){
        setStep(4);
      }
    };
    const back = () => {
      if(step === 3 && reason && reason.subs.length === 0) setStep(1);
      else setStep(s => Math.max(1, s-1));
    };

    const headerTitle = step === 4 ? '' : 'Report broadcast';
    const stepLabel = step === 4 ? '' : `STEP ${step} OF 3`;

    const canAdvance = (() => {
      if(step === 1) return !!reason;
      if(step === 2) return subSel.length > 0;
      if(step === 3) return true;
      return true;
    })();

    const submitTone = reason?.tone === 'warn' ? 'warn' : null;

    return (
      <>
        <div className="scrim" data-open={open} onClick={close}/>
        <div className="modal" data-open={open} role="dialog" aria-label="Report broadcast">
          {step !== 4 && (
            <div className="mhead">
              <button className="back" data-hidden={step === 1} onClick={back} aria-label="Back">{I.back}</button>
              <div>
                <div className="title">{headerTitle}</div>
                <div className="step">{stepLabel}</div>
              </div>
              <button className="x" onClick={close} aria-label="Close">{I.x}</button>
            </div>
          )}

          <div className="mbody">
            {step === 1 && (
              <>
                <p className="lede">
                  Reports go to a small Wrld trust team. Safety reports are reviewed within 5 minutes while live.
                </p>
                <div className="reasons">
                  {REASONS.map(r => (
                    <ReasonRow key={r.id}
                      r={r}
                      sel={reason?.id === r.id}
                      onClick={()=>setReason(r)}
                    />
                  ))}
                </div>
              </>
            )}

            {step === 2 && reason && (
              <>
                <p className="lede">
                  Pick everything that applies. Your specifics help us route to the right reviewer.
                </p>
                <div className="chiplist">
                  {reason.subs.map(s => (
                    <button key={s}
                      className="chip"
                      data-sel={subSel.includes(s)}
                      onClick={()=>toggleSub(s)}
                    >{s}</button>
                  ))}
                </div>
              </>
            )}

            {step === 3 && reason && (
              <>
                <p className="lede">
                  Anything else we should know? Optional — but extra context speeds review.
                </p>

                <div className="field">
                  <label htmlFor="note">CONTEXT (OPTIONAL)</label>
                  <textarea
                    id="note"
                    className="note"
                    placeholder="What happened, when, what you saw…"
                    value={note}
                    onChange={e=>setNote(e.target.value)}
                    maxLength={500}
                  />
                </div>

                <div className="togglerow">
                  <div className="col">
                    <span className="t">Hide this broadcast</span>
                    <span className="d">Stop showing it to me right now.</span>
                  </div>
                  <button className="toggle" data-on={hide} onClick={()=>setHide(v=>!v)} aria-label="Hide broadcast"/>
                </div>
                <div className="togglerow">
                  <div className="col">
                    <span className="t">Block @kai.dc</span>
                    <span className="d">Hide all their broadcasts; they won't be notified.</span>
                  </div>
                  <button className="toggle" data-on={block} onClick={()=>setBlock(v=>!v)} aria-label="Block broadcaster"/>
                </div>

                <div className="privacy">
                  <span className="ic">{I.info}</span>
                  <p>
                    <b>What we share:</b> the broadcaster sees that they were reported, never <b>who</b> reported.
                    A Wrld reviewer sees your account ID for follow-up only.
                  </p>
                </div>
              </>
            )}

            {step === 4 && (
              <div className="done-wrap">
                <div className="done-ring">{I.check}</div>
                <div className="done-h">Report sent</div>
                <p className="done-p">
                  {reason?.tone === 'warn'
                    ? 'Flagged for urgent review. Live broadcasts are looked at within 5 minutes.'
                    : 'A Wrld reviewer will take a look. You won\u2019t hear back unless we need more info.'}
                </p>
                <div className="done-receipt">
                  TICKET <b>#WRL-7F4A2C</b> · {new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                </div>
                <div className="done-actions">
                  {hide && (
                    <div className="done-secondary" style={{cursor:'default', textAlign:'left'}}>
                      ✓ Broadcast hidden from your view
                    </div>
                  )}
                  {block && (
                    <div className="done-secondary" style={{cursor:'default', textAlign:'left'}}>
                      ✓ @kai.dc blocked
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {step !== 4 && <StepBar step={step} total={3}/>}

          <div className="mfoot">
            {step === 4 ? (
              <button className="submit" onClick={close}>Done</button>
            ) : step === 3 ? (
              <button
                className="submit"
                data-tone={submitTone}
                onClick={next}
              >Submit report</button>
            ) : (
              <button
                className="submit"
                disabled={!canAdvance}
                onClick={next}
              >Continue</button>
            )}
          </div>
        </div>
      </>
    );
  }

  function App(){
    const [open, setOpen] = React.useState(true);
    return (
      <div className="phone-root">
        <div className="ctx"/>
        <div className="ctx-strip">
          <div className="ctx-thumb"/>
          <div className="col">
            <div className="l">Atlantic Ave · street fest</div>
            <div className="s">@KAI.DC · BROOKLYN, NY</div>
          </div>
          <span className="live"><span className="sq"/>LIVE</span>
        </div>

        <ReportModal open={open} onClose={()=>setOpen(false)}/>

        {!open && (
          <button onClick={()=>setOpen(true)} style={{
            position:'absolute', bottom:30, left:'50%', transform:'translateX(-50%)',
            zIndex:30, padding:'12px 18px', borderRadius:999,
            background:'var(--panel)', border:'1px solid var(--line-2)',
            backdropFilter:'blur(10px)', color:'var(--ink-dim)',
            font:'500 11px var(--mono)', letterSpacing:'0.12em',
            cursor:'pointer', fontFamily:'var(--sans)'
          }}>REOPEN REPORT</button>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('outer')).render(
    <Shell><App/></Shell>
  );
</script>
</body>
</html>
