<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Choose your plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-hot:#7fd0ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .phone-root{
    width:402px;height:874px;position:relative;overflow:hidden;
    background:
      radial-gradient(800px 520px at 50% -8%, #16202e 0%, var(--bg) 60%),
      var(--bg);
    color:var(--ink);
  }
  /* subtle nightlife glow behind plus card */
  .phone-root::before{
    content:""; position:absolute; top:300px; left:50%; transform:translateX(-50%);
    width:340px; height:300px; border-radius:50%;
    background:radial-gradient(circle, rgba(62,167,255,0.10), transparent 70%);
    pointer-events:none; z-index:0; filter:blur(8px);
  }

  /* ── Scroll body ── */
  .scroll{
    position:absolute; inset:54px 0 0 0; z-index:2;
    overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
    padding:0 0 40px;
  }
  .scroll::-webkit-scrollbar{ display:none }

  /* ── Header ── */
  .hdr{ padding:16px 22px 4px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px }
  .hdr .eyebrow{ font:500 10px var(--mono); letter-spacing:0.16em; color:var(--accent); margin-bottom:8px }
  .hdr h1{ font:600 28px/1.08 var(--sans); letter-spacing:-0.025em; margin:0; text-wrap:balance; max-width:260px }
  .hdr .skip{ flex:none; margin-top:2px;
    background:transparent; border:0; color:var(--ink-faint);
    font:500 12px var(--sans); cursor:pointer; font-family:var(--sans); padding:4px 0; }
  .hdr .sub{ font:500 13px/1.5 var(--sans); color:var(--ink-dim); margin:10px 0 0; text-wrap:pretty; max-width:300px }

  /* ── Billing toggle ── */
  .billing{ padding:18px 22px 4px }
  .seg{
    display:flex; padding:4px; border-radius:999px;
    background:var(--panel-solid); border:1px solid var(--line);
    position:relative;
  }
  .seg .pill{
    position:absolute; top:4px; bottom:4px; width:calc(50% - 4px);
    border-radius:999px; background:var(--accent);
    transition:transform .28s cubic-bezier(.4,1.4,.6,1);
    box-shadow:0 0 20px rgba(62,167,255,0.3);
  }
  .seg[data-plan="annual"] .pill{ transform:translateX(calc(100% + 0px)) }
  .seg button{
    flex:1; z-index:2; position:relative;
    height:42px; border:0; background:transparent; cursor:pointer; font-family:var(--sans);
    display:flex; align-items:center; justify-content:center; gap:7px;
    font:600 13.5px var(--sans); letter-spacing:-0.005em; color:var(--ink-dim);
    transition:color .2s;
  }
  .seg button[data-on="true"]{ color:#0a0c10 }
  .seg .save{
    font:600 9px var(--mono); letter-spacing:0.08em;
    padding:2px 6px; border-radius:999px;
    background:rgba(255,255,255,0.18); color:#0a0c10;
  }
  .seg button[data-on="false"] .save{ background:rgba(62,167,255,0.16); color:var(--accent-hot) }
  .billing .note{
    text-align:center; margin-top:10px;
    font:500 11px var(--mono); letter-spacing:0.06em; color:var(--ink-faint);
    min-height:14px; transition:opacity .2s;
  }
  .billing .note b{ color:var(--accent-hot); font-weight:500 }

  /* ── Tier cards ── */
  .tiers{ padding:14px 18px 4px; display:flex; flex-direction:column; gap:12px }
  .tier{
    position:relative; border-radius:20px;
    background:var(--panel-solid); border:1px solid var(--line);
    padding:18px 18px 16px;
    transition:border-color .2s, background .2s;
  }
  .tier.plus{
    border-color:rgba(62,167,255,0.5);
    background:linear-gradient(180deg, rgba(62,167,255,0.07), rgba(62,167,255,0.015));
    box-shadow:0 0 36px rgba(62,167,255,0.14);
  }
  .badge{
    position:absolute; top:-10px; left:18px;
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px 4px 8px; border-radius:999px;
    background:var(--accent); color:#0a0c10;
    font:600 9px var(--mono); letter-spacing:0.14em;
  }
  .badge .star{ width:8px; height:8px }

  .tier-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px }
  .tier .name{ font:600 18px var(--sans); letter-spacing:-0.01em; color:var(--ink) }
  .tier .tagline{ font:500 11px var(--mono); letter-spacing:0.06em; color:var(--ink-faint); margin-top:3px }
  .price{ text-align:right; flex:none }
  .price .amt{ font:600 26px/1 var(--sans); letter-spacing:-0.02em; color:var(--ink); font-variant-numeric:tabular-nums }
  .price .per{ font:500 10.5px var(--mono); letter-spacing:0.06em; color:var(--ink-dim); margin-top:3px }
  .price .annual-eq{ font:500 9.5px var(--mono); letter-spacing:0.04em; color:var(--ink-faint); margin-top:3px; min-height:11px }
  .price .free{ font:600 22px var(--sans); letter-spacing:-0.01em; color:var(--ink) }

  .perks{ list-style:none; margin:14px 0 16px; padding:0; display:flex; flex-direction:column; gap:9px }
  .perks li{ display:flex; gap:9px; align-items:flex-start; font:500 13px/1.4 var(--sans); color:var(--ink-dim) }
  .perks li b{ color:var(--ink); font-weight:500 }
  .perks .ck{ flex:none; width:16px; height:16px; margin-top:1px;
    border-radius:50%; display:grid; place-items:center;
    background:rgba(62,167,255,0.14); color:var(--accent); }
  .perks .ck svg{ width:9px; height:9px }
  .tier.plus .perks .ck{ background:rgba(62,167,255,0.2) }

  .cta{
    width:100%; height:50px; border-radius:15px; cursor:pointer; font-family:var(--sans);
    font:600 14.5px var(--sans); letter-spacing:-0.005em;
    transition:transform .18s, box-shadow .2s, background .2s;
  }
  .cta:active{ transform:scale(0.98) }
  .cta.filled{ border:0; background:var(--accent); color:#0a0c10; box-shadow:0 0 28px rgba(62,167,255,0.2) }
  .cta.filled.pro{ background:var(--ink); box-shadow:0 0 24px rgba(236,233,226,0.12) }
  .cta.subtle{ background:transparent; border:1px solid var(--line-2); color:var(--ink) }

  /* ── Compare section ── */
  .compare{ padding:18px 18px 0 }
  .compare-toggle{
    width:100%; height:52px; border-radius:15px;
    background:var(--panel-solid); border:1px solid var(--line);
    color:var(--ink); cursor:pointer; font-family:var(--sans);
    display:flex; align-items:center; justify-content:center; gap:9px;
    font:600 13.5px var(--sans); letter-spacing:-0.005em;
  }
  .compare-toggle .chev{ transition:transform .28s cubic-bezier(.4,1.4,.6,1); color:var(--ink-dim) }
  .compare-toggle[data-open="true"] .chev{ transform:rotate(180deg) }

  .matrix-wrap{
    max-height:0; overflow:hidden;
    transition:max-height .4s cubic-bezier(.4,0,.2,1);
  }
  .matrix-wrap[data-open="true"]{ max-height:760px }
  .matrix{
    margin-top:12px; border-radius:16px; overflow:hidden;
    background:var(--panel-solid); border:1px solid var(--line);
  }
  .matrix .mhead{
    display:grid; grid-template-columns:1.4fr 0.85fr 0.85fr 0.85fr;
    align-items:end; gap:6px; padding:14px 12px 12px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--panel-solid);
  }
  .matrix .mhead .feat-lbl{ font:500 9px var(--mono); letter-spacing:0.14em; color:var(--ink-faint) }
  .matrix .mhead .col{ text-align:center; font:600 12px var(--sans); letter-spacing:-0.005em; color:var(--ink) }
  .matrix .mhead .col.plus{ color:var(--accent-hot) }
  .matrix .mhead .col .pr{ display:block; font:500 9px var(--mono); letter-spacing:0.04em; color:var(--ink-faint); margin-top:2px; font-variant-numeric:tabular-nums }

  .mrow{
    display:grid; grid-template-columns:1.4fr 0.85fr 0.85fr 0.85fr;
    align-items:center; gap:6px; padding:11px 12px;
    border-top:1px solid var(--line);
  }
  .mrow:first-of-type{ border-top:0 }
  .mrow .feat{ font:500 12px/1.3 var(--sans); color:var(--ink); text-wrap:pretty }
  .mrow .cell{ display:flex; align-items:center; justify-content:center;
    font:500 11px var(--mono); letter-spacing:0.04em; text-align:center; }
  .mrow .cell.txt{ color:var(--ink-dim) }
  .mrow .cell.txt.best{ color:var(--accent-hot) }
  .mrow .cell .yes{ width:18px; height:18px; border-radius:50%;
    display:grid; place-items:center; background:rgba(62,167,255,0.16); color:var(--accent) }
  .mrow .cell .yes svg{ width:10px; height:10px }
  .mrow .cell .no{ color:var(--ink-faint); opacity:0.6 }
  .mrow .cell .no svg{ width:13px; height:13px }
  .mrow.plus-col{ } /* highlight handled per-cell */
  .matrix .plus-band{ background:rgba(62,167,255,0.04) }

  /* ── Footer ── */
  .foot{ padding:22px 22px 0; text-align:center }
  .foot .restore{
    background:transparent; border:0; color:var(--ink-dim);
    font:500 12px var(--sans); cursor:pointer; font-family:var(--sans);
    text-decoration:underline; text-decoration-color:var(--line-2); text-underline-offset:3px;
    padding:6px 0;
  }
  .foot .legal{
    margin-top:12px; font:500 10px/1.6 var(--mono); letter-spacing:0.03em; color:var(--ink-faint);
    max-width:320px; margin-left:auto; margin-right:auto; text-wrap:pretty;
  }
  .foot .legal a{ color:var(--ink-dim); text-decoration:underline; text-decoration-color:var(--line-2) }
</style>
</head>
<body>
<div id="outer" style="width:100%;height:100%;display:grid;place-items:center"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  // ── Inline phone frame ──
  function IOSStatusBar(){
    const c='#fff';
    return (<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'21px 34px 19px',width:'100%',boxSizing:'border-box'}}>
      <span style={{fontFamily:'-apple-system,system-ui',fontWeight:590,fontSize:17,color:c}}>9:41</span>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
      </div></div>);
  }
  function IOSDevice({children}){
    return (<div style={{width:402,height:874,borderRadius:48,overflow:'hidden',position:'relative',background:'#000',boxShadow:'0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)',fontFamily:'-apple-system,system-ui,sans-serif'}}>
      <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:40}}><IOSStatusBar/></div>
      <div style={{position:'absolute',inset:0}}>{children}</div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
        <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,0.7)'}}/>
      </div></div>);
  }
  function Shell({children}){
    const fit=()=>{const vh=window.innerHeight,vw=window.innerWidth;return Math.min(vw/(402+40),vh/(874+40),1);}
    const [s,setS]=React.useState(fit());
    React.useEffect(()=>{const on=()=>setS(fit());window.addEventListener('resize',on);return()=>window.removeEventListener('resize',on);},[]);
    return <div style={{transform:`scale(${s})`,transformOrigin:'center'}}><IOSDevice>{children}</IOSDevice></div>;
  }

  // ── Icons ──
  const Check = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>;
  const Ex    = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>;
  const Star  = <svg className="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.6L21 9.2l-5 4.3L17.5 21 12 17.3 6.5 21 8 13.5l-5-4.3 6.4-.6z"/></svg>;
  const Chev  = <svg className="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>;

  // ── Pricing model ──
  // Monthly base. Annual ≈ 20% off → billed yearly, shown as /yr with a per-mo equiv.
  const PRICING = {
    plus: { mo: 5,  yr: 48 },   // 48/12 = 4.00/mo  (20% off 60)
    pro:  { mo: 20, yr: 192 },  // 192/12 = 16.00/mo (20% off 240)
  };

  const PERKS = {
    free: ['Go live & collect tips', 'Discover local live music', 'A handful of saved streams'],
    plus: ['Everything in Free, ad-free', 'More saved streams & better analytics', 'Limited multi-camera', 'Better discovery & moderation'],
    pro:  ['Everything in Plus', 'Pay-per-view & channel subscriptions', 'Full multi-camera', 'AI moderation & pro analytics'],
  };

  // ── Feature matrix ──
  // val types: true | false | string. tone 'best' lights the cell accent.
  const MATRIX = [
    { f:'Ad-free experience',     free:false,        plus:true,            pro:true },
    { f:'Go live',                free:true,         plus:true,            pro:true },
    { f:'Tips',                   free:true,         plus:true,            pro:true },
    { f:'Saved streams',          free:'Small',      plus:'More',          pro:{t:'Huge',best:true} },
    { f:'Analytics',              free:'Basic',      plus:'Better',        pro:{t:'Pro',best:true} },
    { f:'Pay-per-view (PPV)',     free:false,        plus:false,           pro:true },
    { f:'Channel subscriptions',  free:false,        plus:false,           pro:true },
    { f:'Multi-camera',           free:false,        plus:'Limited',       pro:true },
    { f:'Discovery tools',        free:'Basic',      plus:'Better',        pro:{t:'Best',best:true} },
    { f:'Moderation tools',       free:'Basic',      plus:'Better',        pro:{t:'AI',best:true} },
  ];

  function Cell({ v }){
    if(v === true)  return <span className="cell"><span className="yes">{Check}</span></span>;
    if(v === false) return <span className="cell"><span className="no">{Ex}</span></span>;
    const t = typeof v === 'object' ? v.t : v;
    const best = typeof v === 'object' && v.best;
    return <span className={"cell txt" + (best ? " best" : "")}>{t}</span>;
  }

  function App(){
    const [plan, setPlan] = React.useState('monthly'); // monthly | annual
    const [open, setOpen] = React.useState(false);
    const annual = plan === 'annual';

    const priceFor = (tier) => {
      const p = PRICING[tier];
      if(annual){
        return { amt: '$'+p.yr, per: '/year', eq: '$'+(p.yr/12).toFixed(0)+'/mo billed yearly' };
      }
      return { amt: '$'+p.mo, per: '/month', eq: '' };
    };
    const plus = priceFor('plus');
    const pro  = priceFor('pro');

    return (
      <div className="phone-root">
        <div className="scroll">

          {/* Header */}
          <div className="hdr">
            <div>
              <div className="eyebrow">WELCOME TO WRLD</div>
              <h1>Choose your WRLD</h1>
            </div>
            <button className="skip">Skip</button>
          </div>
          <div className="hdr" style={{paddingTop:0}}>
            <p className="sub">Start free and upgrade whenever you want more reach, more cameras, and more ways to earn.</p>
          </div>

          {/* Billing toggle */}
          <div className="billing">
            <div className="seg" data-plan={plan}>
              <div className="pill"></div>
              <button data-on={!annual} onClick={()=>setPlan('monthly')}>Monthly</button>
              <button data-on={annual} onClick={()=>setPlan('annual')}>
                Annual <span className="save">SAVE ~20%</span>
              </button>
            </div>
            <div className="note" style={{opacity: annual ? 1 : 0}}>
              <b>Two months free</b> when you pay yearly
            </div>
          </div>

          {/* Tier cards */}
          <div className="tiers">

            {/* FREE */}
            <div className="tier">
              <div className="tier-top">
                <div>
                  <div className="name">Free</div>
                  <div className="tagline">START HERE</div>
                </div>
                <div className="price">
                  <div className="free">Free</div>
                  <div className="per">forever</div>
                </div>
              </div>
              <ul className="perks">
                {PERKS.free.map((p,i)=>(
                  <li key={i}><span className="ck">{Check}</span><span>{p}</span></li>
                ))}
              </ul>
              <button className="cta subtle">Continue with Free</button>
            </div>

            {/* PLUS — highlighted */}
            <div className="tier plus">
              <span className="badge">{Star} MOST POPULAR</span>
              <div className="tier-top">
                <div>
                  <div className="name">Plus</div>
                  <div className="tagline">FOR REGULARS</div>
                </div>
                <div className="price">
                  <div className="amt">{plus.amt}</div>
                  <div className="per">{plus.per}</div>
                  <div className="annual-eq">{plus.eq}</div>
                </div>
              </div>
              <ul className="perks">
                {PERKS.plus.map((p,i)=>(
                  <li key={i}><span className="ck">{Check}</span><span>{p}</span></li>
                ))}
              </ul>
              <button className="cta filled">Choose Plus</button>
            </div>

            {/* PRO */}
            <div className="tier">
              <div className="tier-top">
                <div>
                  <div className="name">Pro</div>
                  <div className="tagline">FOR CREATORS</div>
                </div>
                <div className="price">
                  <div className="amt">{pro.amt}</div>
                  <div className="per">{pro.per}</div>
                  <div className="annual-eq">{pro.eq}</div>
                </div>
              </div>
              <ul className="perks">
                {PERKS.pro.map((p,i)=>(
                  <li key={i}><span className="ck">{Check}</span><span>{p}</span></li>
                ))}
              </ul>
              <button className="cta filled pro">Choose Pro</button>
            </div>

          </div>

          {/* Compare */}
          <div className="compare">
            <button className="compare-toggle" data-open={open} onClick={()=>setOpen(o=>!o)}>
              {open ? 'Hide comparison' : 'Compare all features'} {Chev}
            </button>
            <div className="matrix-wrap" data-open={open}>
              <div className="matrix">
                <div className="mhead">
                  <span className="feat-lbl">FEATURE</span>
                  <span className="col">Free</span>
                  <span className="col plus">Plus<span className="pr">{plus.amt}{annual?'/yr':'/mo'}</span></span>
                  <span className="col">Pro<span className="pr">{pro.amt}{annual?'/yr':'/mo'}</span></span>
                </div>
                {MATRIX.map((row,i)=>(
                  <div className="mrow" key={i}>
                    <span className="feat">{row.f}</span>
                    <Cell v={row.free}/>
                    <Cell v={row.plus}/>
                    <Cell v={row.pro}/>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="foot">
            <button className="restore">Restore purchases</button>
            <p className="legal">
              Plans renew automatically until cancelled. Cancel anytime in your store account.
              By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
            </p>
          </div>

        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('outer')).render(<Shell><App/></Shell>);
</script>
</body>
</html>
