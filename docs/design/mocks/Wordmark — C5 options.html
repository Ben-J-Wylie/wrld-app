<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Wordmark · C5 options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Same aesthetic-honesty note: dark/blue/glass to keep the comparison
     structural; locked tokens apply later in 12.5.

     C5 question: wordmark casing + brand mark.
       A. "WRLD" hero-sized, no mark (current code)
       B. "Wrld" sentence-case + circle-cross mark, chrome-sized (matches mock)
       C. "WRLD" hero-sized + circle-cross mark (hybrid — my prior recommendation)

     The mark itself is the original Globe Mobile mock's design: a hollow circle
     with two crossing inner ellipses — reads as a meridian + parallel through
     a globe. Adopting it is part of this decision; rejecting it would land us
     at A. */

  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .device{width:402px;height:874px;border-radius:48px;overflow:hidden;position:relative;background:#000;box-shadow:0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:24px;background:#000;z-index:50}
  .home{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:139px;height:5px;border-radius:100px;background:rgba(255,255,255,0.7);z-index:60}
  .status{position:absolute;top:0;left:0;right:0;height:55px;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:21px 34px 19px;color:#fff;font-family:-apple-system,system-ui,sans-serif}
  .status .t{font-weight:600;font-size:17px}
  .status .r{font:600 13px monospace;opacity:0.85}

  .phone-root{position:absolute;inset:0;overflow:hidden}

  .canvas-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(900px 700px at 50% 55%, #1a2030 0%, #0b0d11 60%, #050608 100%)}
  .globe{position:absolute;left:50%;top:240px;transform:translateX(-50%);width:520px;height:520px;border-radius:50%;
    background:radial-gradient(40% 50% at 30% 30%, rgba(62,167,255,0.30), transparent 60%),
               radial-gradient(60% 70% at 70% 70%, rgba(20,30,55,0.9), transparent 60%),
               radial-gradient(circle at 50% 50%, #1a2230 0%, #0a0e16 70%);
    box-shadow:0 0 120px rgba(62,167,255,0.18), inset -40px -50px 120px rgba(0,0,0,0.6);
    opacity:0.65}
  .dot{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 12px var(--live-glow)}
  .dot.acc{background:var(--accent);box-shadow:0 0 12px var(--accent-glow)}

  .swap{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:90;display:flex;gap:4px;padding:4px;border-radius:999px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border:1px solid var(--line-2)}
  .swap button{background:transparent;border:0;color:var(--ink-dim);font:500 10px var(--mono);letter-spacing:0.12em;padding:6px 10px;border-radius:999px;cursor:pointer}
  .swap button.on{background:var(--ink);color:#000}

  /* ── Header row (variable: brand block on left) ── */
  .header{position:absolute;left:14px;right:14px;top:106px;z-index:5;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;color:var(--ink)}

  /* Hero variant (used by A, C) */
  .brand .wordmark-hero{font:600 28px var(--sans);letter-spacing:-0.02em}
  /* Chrome variant (used by B) */
  .brand .wordmark-chrome{font:600 14px var(--sans);letter-spacing:-0.005em}

  /* Mark — circle with two crossing inner ellipses (used by B, C) */
  .brand .mark{width:18px;height:18px;border:1.5px solid currentColor;border-radius:50%;position:relative;flex:none}
  .brand .mark::before,.brand .mark::after{content:"";position:absolute;inset:0;border:1.5px solid currentColor;border-radius:50%}
  .brand .mark::before{transform:scaleX(0.35)}
  .brand .mark::after{transform:scaleY(0.35)}
  /* Hero size mark for C */
  .brand .mark-hero{width:26px;height:26px;border-width:2px}
  .brand .mark-hero::before,.brand .mark-hero::after{border-width:2px}

  .livepill{display:inline-flex;align-items:center;gap:6px;font:500 10px var(--mono);letter-spacing:0.12em;color:var(--ink-dim);padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel);backdrop-filter:blur(8px)}
  .livepill .d{width:6px;height:6px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--live);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.7)}}
  .livepill b{color:var(--ink);font-weight:500}

  /* ── Constants (locked) ── */
  .search{position:absolute;left:14px;right:14px;top:154px;z-index:5;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:10px 14px;backdrop-filter:blur(10px)}
  .search svg{opacity:.6;flex:none;color:var(--ink-dim)}
  .search input{flex:1;background:none;border:0;outline:0;color:var(--ink);font:500 14px var(--sans)}
  .search input::placeholder{color:var(--ink-faint)}

  .cats{position:absolute;left:0;right:0;top:206px;z-index:5;display:flex;gap:6px;overflow-x:auto;padding:2px 14px 4px;-webkit-overflow-scrolling:touch}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:none;font:500 12px var(--sans);color:var(--ink-dim);padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);white-space:nowrap}
  .cat[aria-pressed="true"]{color:var(--bg);background:var(--ink);border-color:var(--ink)}

  .icard{position:absolute;left:14px;right:14px;bottom:34px;z-index:20;background:var(--panel-solid);border:1px solid var(--line-2);border-radius:18px;padding:14px;box-shadow:0 -12px 40px rgba(0,0,0,0.45);display:flex;align-items:center;gap:12px}
  .av{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #ffd6a3 0%, #d68957 40%, #6b3a1d 100%);display:grid;place-items:center;font:600 16px var(--sans);color:#2b1a0a;border:1px solid var(--line-2);flex:none}
  .icard .col{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
  .icard .title{font:600 14px var(--sans);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .icard .handle{font:500 11px var(--mono);color:var(--accent);letter-spacing:0.06em}
  .icard .meta{font:500 10.5px var(--mono);color:var(--ink-dim);letter-spacing:0.06em}
  .join-btn{flex:none;height:36px;padding:0 18px;border-radius:999px;background:var(--accent);color:#0a0c10;border:0;font:600 13px var(--sans);cursor:pointer}

  /* ── Sub-option visibility ── */
  /* (A) WRLD hero, no mark */
  [data-c5="a"] .brand .mark{display:none}
  [data-c5="a"] .brand .mark-hero{display:none}
  [data-c5="a"] .brand .wordmark-chrome{display:none}
  [data-c5="a"] .brand .wordmark-hero{display:inline}

  /* (B) Wrld chrome + small mark */
  [data-c5="b"] .brand .mark{display:block}
  [data-c5="b"] .brand .mark-hero{display:none}
  [data-c5="b"] .brand .wordmark-hero{display:none}
  [data-c5="b"] .brand .wordmark-chrome{display:inline}

  /* (C) WRLD hero + hero-sized mark */
  [data-c5="c"] .brand .mark{display:none}
  [data-c5="c"] .brand .mark-hero{display:block}
  [data-c5="c"] .brand .wordmark-chrome{display:none}
  [data-c5="c"] .brand .wordmark-hero{display:inline}

  .label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font:500 11px var(--mono);letter-spacing:0.14em;pointer-events:none;text-align:center}
  .label b{color:rgba(255,255,255,0.75);font-weight:500}
</style>
</head>
<body>

<div class="device" id="root" data-c5="a">
  <div class="notch"></div>
  <div class="status"><span class="t">9:41</span><span class="r">● ● ●</span></div>

  <div class="phone-root">
    <div class="canvas-bg"></div>
    <div class="globe"></div>
    <span class="dot"     style="top:340px;left:140px"></span>
    <span class="dot acc" style="top:300px;left:260px"></span>
    <span class="dot acc" style="top:420px;left:200px"></span>
    <span class="dot"     style="top:240px;left:230px"></span>
    <span class="dot acc" style="top:480px;left:300px"></span>
    <span class="dot acc" style="top:380px;left:110px"></span>
    <span class="dot"     style="top:520px;left:160px"></span>
    <span class="dot acc" style="top:560px;left:250px"></span>

    <!-- Header — variable brand block on the left -->
    <div class="header">
      <div class="brand">
        <span class="mark"></span>
        <span class="mark mark-hero"></span>
        <span class="wordmark-hero">WRLD</span>
        <span class="wordmark-chrome">Wrld</span>
      </div>
      <span class="livepill"><span class="d"></span><b>147</b> LIVE</span>
    </div>

    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input placeholder="Search handle, title, or city"/>
    </div>

    <div class="cats">
      <button class="cat" aria-pressed="true">All</button>
      <button class="cat">Cities</button>
      <button class="cat">Weather</button>
      <button class="cat">Nature</button>
      <button class="cat">Events</button>
      <button class="cat">Landmarks</button>
    </div>

    <div class="icard">
      <div class="av">K</div>
      <div class="col">
        <div class="title">Atlantic Ave · street fest, drumline forming up</div>
        <div class="handle">@kai.dc</div>
        <div class="meta">1.4K watching · 0.4 mi</div>
      </div>
      <button class="join-btn">Join</button>
    </div>

    <div class="swap" role="tablist" aria-label="Sub-option">
      <button data-c="a" class="on">A · WRLD HERO</button>
      <button data-c="b">B · Wrld + MARK</button>
      <button data-c="c">C · WRLD + MARK</button>
    </div>
  </div>

  <div class="home"></div>
</div>

<div class="label">C5 — WORDMARK + BRAND MARK<br><b>A:</b> WRLD hero, no mark (current code) · <b>B:</b> "Wrld" sentence-case + small mark (mock) · <b>C:</b> WRLD hero + hero-sized mark (hybrid)</div>

<script>
  const root = document.getElementById('root')
  document.querySelectorAll('.swap button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.swap button').forEach(x => x.classList.toggle('on', x === b))
      root.dataset.c5 = b.dataset.c
    }
  })
</script>
</body>
</html>
