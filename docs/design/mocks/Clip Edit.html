<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Clip Edit</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");
  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-hot:#7fd0ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .phone-root{ width:402px; height:874px; position:relative; overflow:hidden;
    background:var(--bg); color:var(--ink); }

  /* ── Top bar ── */
  .topbar{
    position:absolute; top:54px; left:0; right:0; z-index:30;
    height:44px; padding:0 14px;
    display:grid; grid-template-columns:36px 1fr auto; align-items:center; gap:10px;
  }
  .iconbtn{ width:36px;height:36px;border-radius:50%;
    border:1px solid var(--line); background:rgba(0,0,0,0.4);
    color:var(--ink); display:grid; place-items:center;
    backdrop-filter:blur(10px); cursor:pointer; font-family:var(--sans);
    transition:transform .18s; }
  .iconbtn:active{ transform:scale(0.94) }
  .topbar .title{
    font:600 14px var(--sans); letter-spacing:-0.005em; color:var(--ink);
    text-align:center;
  }
  .topbar .sub{
    font:500 9.5px var(--mono); letter-spacing:0.16em;
    color:var(--ink-faint); text-align:center; margin-top:2px;
  }
  .save-btn{
    height:34px; padding:0 14px; border-radius:999px;
    background:transparent; border:1px solid var(--line-2); color:var(--ink-dim);
    font:500 11px var(--mono); letter-spacing:0.12em;
    cursor:pointer; font-family:var(--sans);
    transition:color .2s, border-color .2s;
  }
  .save-btn[data-dirty="true"]{ border-color:var(--accent); color:var(--accent) }

  /* ── Scroll body ── */
  .scroll{ position:absolute; inset:0; z-index:2;
    overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
    padding:114px 0 110px; }
  .scroll::-webkit-scrollbar{display:none}

  /* ── Preview hero ── */
  .preview{
    margin:0 14px;
    aspect-ratio: 16 / 11;
    border-radius:18px; position:relative; overflow:hidden;
    background:linear-gradient(135deg, #1a1d25, #0a0a0c);
    border:1px solid var(--line);
  }
  .preview .cam{
    position:absolute; inset:0;
    background:
      radial-gradient(60% 80% at 30% 80%, rgba(255,160,90,0.28), transparent 60%),
      radial-gradient(40% 50% at 80% 30%, rgba(62,167,255,0.25), transparent 70%),
      linear-gradient(180deg, #1d1410, #0a0a0c);
  }
  .preview .grain{
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay; pointer-events:none;
  }
  /* Fallback — audio only */
  .preview .audio-fallback{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg, #131720, #08090c);
    flex-direction:column; gap:12px;
  }
  .audio-fallback .wave{ display:flex; align-items:center; gap:3px; height:60px; }
  .audio-fallback .wave i{ width:3px; border-radius:2px; background:var(--accent);
    box-shadow:0 0 8px var(--accent-glow); animation:wv 1.4s ease-in-out infinite; }
  @keyframes wv{ 0%,100%{height:8px} 50%{height:48px} }
  .audio-fallback .lab{
    font:500 10px var(--mono); letter-spacing:0.2em; color:var(--ink-dim);
  }
  /* Fallback — map (loc only, cam off) */
  .preview .map-fallback{
    position:absolute; inset:0;
    background:
      radial-gradient(50% 60% at 40% 40%, rgba(62,167,255,0.18), transparent 60%),
      linear-gradient(135deg, #14202c 0%, #0a0e15 100%);
  }
  .preview .map-fallback::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(0deg, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:24px 24px;
  }
  .preview .map-fallback .pin{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 4px rgba(62,167,255,0.18), 0 0 20px var(--accent-glow);
    animation:ping 2s ease-out infinite;
  }
  @keyframes ping{ 0%{box-shadow:0 0 0 4px rgba(62,167,255,0.18), 0 0 20px var(--accent-glow)}
    100%{box-shadow:0 0 0 24px rgba(62,167,255,0), 0 0 20px transparent} }

  .preview .ctlbar{
    position:absolute; left:12px; right:12px; bottom:10px; z-index:5;
    display:flex; align-items:center; gap:10px;
    color:var(--ink); font:500 10.5px var(--mono); letter-spacing:0.06em;
    font-variant-numeric:tabular-nums;
  }
  .ctlbar .pp{
    width:34px; height:34px; border-radius:50%;
    background:rgba(0,0,0,0.55); border:1px solid var(--line-2);
    backdrop-filter:blur(8px);
    color:var(--ink); display:grid; place-items:center; cursor:pointer;
    flex:none;
  }
  .ctlbar .pbar{
    flex:1; height:3px; border-radius:999px; background:rgba(255,255,255,0.18);
    position:relative; overflow:visible;
  }
  .ctlbar .pbar .played{
    position:absolute; left:0; top:0; bottom:0;
    width:38%; background:var(--ink); border-radius:999px;
  }
  .ctlbar .pbar .knob{
    position:absolute; left:38%; top:50%; transform:translate(-50%,-50%);
    width:10px; height:10px; border-radius:50%; background:#fff;
    box-shadow:0 0 0 3px rgba(0,0,0,0.4);
  }
  .preview .viewer-tag{
    position:absolute; top:12px; left:12px; z-index:4;
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 9px 5px 7px; border-radius:8px;
    background:rgba(0,0,0,0.55); border:1px solid var(--line-2);
    backdrop-filter:blur(8px);
    color:var(--ink); font:500 9.5px var(--mono); letter-spacing:0.14em;
  }
  .preview .viewer-tag .eye{
    width:10px; height:10px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 6px var(--accent-glow);
  }

  /* Layer overlays on preview */
  .lay-overlay{
    position:absolute; right:12px; top:12px; z-index:4;
    display:flex; gap:6px;
  }
  .lay-overlay .l{
    width:24px; height:24px; border-radius:7px;
    background:rgba(0,0,0,0.55); border:1px solid var(--line-2);
    color:var(--ink-dim); display:grid; place-items:center;
    backdrop-filter:blur(8px);
  }
  .lay-overlay .l[data-on="true"]{ color:var(--accent); border-color:rgba(62,167,255,0.4) }
  .lay-overlay .l[data-on="true"][data-id="true"]{ color:var(--ink); border-color:var(--line-2) }
  .lay-overlay .l[data-deleted="true"]{ color:rgba(255,77,77,0.6); border-color:rgba(255,77,77,0.25); opacity:0.7 }
  .lay-overlay .l svg{ width:12px;height:12px }

  /* ── Timeline ── */
  .timeline{
    margin:14px 14px 0;
    padding:14px 16px 12px;
    border-radius:16px;
    background:var(--panel-solid); border:1px solid var(--line);
  }
  .tl-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:12px;
  }
  .tl-head .lab{ font:500 10px var(--mono); color:var(--ink-faint); letter-spacing:0.16em }
  .tl-head .dur{
    font:500 11px var(--mono); color:var(--ink); letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
  }
  .tl-head .dur .orig{ color:var(--ink-faint); margin-left:8px; text-decoration:line-through }

  .track{
    position:relative; height:44px; border-radius:10px;
    background:rgba(255,255,255,0.03); border:1px solid var(--line);
    overflow:hidden;
  }
  /* Waveform bars (decorative) */
  .track .wf{
    position:absolute; inset:0;
    display:flex; align-items:center; gap:1.5px; padding:0 8px;
  }
  .track .wf i{
    flex:1; background:var(--ink-faint); border-radius:1px; opacity:0.5;
  }
  /* Trimmed-out region */
  .track .trim-out{
    position:absolute; top:0; bottom:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(2px);
    z-index:2;
  }
  .track .trim-out::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 4px, transparent 4px 8px);
  }
  /* Active region */
  .track .active{
    position:absolute; top:0; bottom:0;
    border-left:2px solid var(--accent);
    border-right:2px solid var(--accent);
    z-index:3;
  }
  .track .active::before, .track .active::after{
    content:""; position:absolute; top:50%; transform:translateY(-50%);
    width:14px; height:30px; border-radius:5px;
    background:var(--accent); box-shadow:0 0 12px rgba(62,167,255,0.4);
  }
  .track .active::before{ left:-8px }
  .track .active::after{ right:-8px }
  /* Scrubber */
  .track .scrub{
    position:absolute; top:-3px; bottom:-3px; width:2px;
    background:var(--ink); z-index:4; pointer-events:none;
  }
  .track .scrub::before{
    content:""; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
    width:10px; height:10px; border-radius:50%; background:var(--ink);
  }

  .tl-foot{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:11px;
    font:500 9.5px var(--mono); color:var(--ink-faint); letter-spacing:0.12em;
  }
  .tl-foot .stamps{
    display:inline-flex; gap:14px; align-items:center;
  }
  .tl-foot .stamps b{ color:var(--ink); font-weight:500; font-variant-numeric:tabular-nums; margin-left:4px }
  .perm-cut{
    background:transparent; border:0; padding:6px 0;
    color:rgba(255,77,77,0.7); font-family:var(--sans);
    font:500 10px var(--mono); letter-spacing:0.12em;
    cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  }
  .perm-cut:hover{ color:var(--live) }
  .perm-cut svg{ width:11px; height:11px }

  /* ── Visibility / ID banner ── */
  .vis-banner{
    margin:14px 14px 0;
    padding:14px 14px 14px 14px;
    border-radius:16px;
    display:flex; gap:12px; align-items:flex-start;
    background:rgba(255,77,77,0.06); border:1px solid rgba(255,77,77,0.28);
  }
  .vis-banner .ic{
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,77,77,0.12); color:var(--live);
    display:grid; place-items:center; flex:none;
  }
  .vis-banner.acc{
    background:rgba(62,167,255,0.06); border-color:rgba(62,167,255,0.28);
  }
  .vis-banner.acc .ic{ background:rgba(62,167,255,0.12); color:var(--accent) }
  .vis-banner .col{ display:flex; flex-direction:column; gap:4px }
  .vis-banner .t{ font:600 13px var(--sans); color:var(--ink); letter-spacing:-0.005em }
  .vis-banner .d{ font:500 11.5px/1.5 var(--sans); color:var(--ink-dim); text-wrap:pretty }
  .vis-banner .d b{ color:var(--ink); font-weight:500 }

  /* ── Section title ── */
  .sec-h{
    padding:18px 18px 8px;
    display:flex; align-items:baseline; justify-content:space-between;
    font:500 10.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .sec-h .r{ color:var(--ink-dim) }

  /* ── Layer panel ── */
  .layers{ margin:0 14px;
    border-radius:16px; overflow:hidden;
    background:var(--panel-solid); border:1px solid var(--line); }
  .layer{
    display:grid;
    grid-template-columns:34px 1fr 44px 30px;
    align-items:center; gap:12px;
    padding:13px 14px;
    border-top:1px solid var(--line);
    transition:background .2s;
  }
  .layer:first-child{ border-top:0 }
  .layer .ic{
    width:34px; height:34px; border-radius:9px;
    background:rgba(255,255,255,0.04); border:1px solid var(--line);
    display:grid; place-items:center; color:var(--ink-dim);
  }
  .layer[data-on="true"] .ic{
    color:var(--accent); border-color:rgba(62,167,255,0.32);
    background:rgba(62,167,255,0.08);
  }
  .layer[data-on="true"][data-key="id"] .ic{ color:var(--ink); background:rgba(255,255,255,0.06); border-color:var(--line-2) }
  .layer[data-deleted="true"] .ic{ color:rgba(255,77,77,0.55); border-color:rgba(255,77,77,0.2); background:rgba(255,77,77,0.04) }
  .layer .col{ display:flex; flex-direction:column; gap:3px; min-width:0 }
  .layer .name{
    font:600 13.5px var(--sans); color:var(--ink); letter-spacing:-0.005em;
    display:flex; align-items:center; gap:8px;
  }
  .layer .name .pip{
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 6px; border-radius:4px;
    border:1px solid var(--line-2); background:rgba(255,255,255,0.04);
    color:var(--ink-dim);
    font:500 8.5px var(--mono); letter-spacing:0.14em;
    flex:none;
  }
  .layer[data-deleted="true"] .name .pip{
    color:var(--live); border-color:rgba(255,77,77,0.32); background:rgba(255,77,77,0.08);
  }
  .layer[data-on="false"][data-deleted="false"] .name .pip{
    color:var(--ink-faint);
  }
  .layer .desc{ font:500 10.5px var(--mono); color:var(--ink-faint); letter-spacing:0.06em; line-height:1.4 }
  .layer[data-deleted="true"] .name{ color:var(--ink-dim); text-decoration:line-through; text-decoration-color:rgba(255,77,77,0.4) }
  .layer[data-deleted="true"] .desc{ color:rgba(255,77,77,0.55) }

  .toggle{
    width:44px; height:26px; border-radius:999px;
    background:#2a2e35; border:0; padding:0; flex:none;
    position:relative; cursor:pointer;
    transition:background .22s cubic-bezier(.4,1.4,.6,1);
    font-family:var(--sans);
  }
  .toggle::after{
    content:""; position:absolute; top:3px; left:3px;
    width:20px; height:20px; border-radius:50%;
    background:var(--ink);
    transition:transform .22s cubic-bezier(.4,1.4,.6,1), background .22s;
  }
  .toggle[data-on="true"]{ background:var(--accent) }
  .toggle[data-on="true"]::after{ transform:translateX(18px); background:#fff }
  .toggle[disabled]{ opacity:0.32; cursor:not-allowed }

  .row-menu{
    width:30px; height:30px; border-radius:8px;
    background:transparent; border:0; color:var(--ink-faint);
    display:grid; place-items:center; cursor:pointer;
    transition:color .2s, background .2s; font-family:var(--sans);
  }
  .row-menu:hover{ color:var(--ink-dim); background:rgba(255,255,255,0.04) }
  .row-menu[disabled]{ opacity:0.3; cursor:not-allowed }

  /* Layer destructive actions */
  .row-actions{
    grid-column:1 / -1;
    margin-top:6px; padding-top:10px;
    border-top:1px dashed var(--line);
    display:flex; gap:8px;
  }
  .destroy-btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 11px; border-radius:8px;
    background:transparent; border:1px solid rgba(255,77,77,0.28);
    color:rgba(255,77,77,0.85);
    font:500 10px var(--mono); letter-spacing:0.12em;
    cursor:pointer; transition:background .2s, color .2s;
    font-family:var(--sans);
  }
  .destroy-btn:hover{ background:rgba(255,77,77,0.08); color:var(--live) }
  .destroy-btn svg{ width:12px;height:12px }

  /* ── Tags ── */
  .tags-card{
    margin:0 14px;
    padding:12px 14px;
    border-radius:16px;
    background:var(--panel-solid); border:1px solid var(--line);
    display:flex; flex-wrap:wrap; align-items:center; gap:6px;
  }
  .tag{
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 6px 7px 11px; border-radius:999px;
    background:rgba(62,167,255,0.08); border:1px solid rgba(62,167,255,0.28);
    color:var(--ink);
    font:500 11px var(--sans); letter-spacing:-0.005em;
  }
  .tag .x{ width:18px; height:18px; border-radius:50%;
    background:transparent; border:0; color:var(--ink-dim);
    cursor:pointer; display:grid; place-items:center; font-family:var(--sans); }
  .tag .x:hover{ color:var(--ink) }
  .tag .x svg{ width:9px; height:9px }
  .tag-input{
    flex:1; min-width:120px; height:28px;
    padding:0 6px; border:0; background:transparent; outline:none;
    color:var(--ink); font:500 12px var(--sans);
  }
  .tag-input::placeholder{ color:var(--ink-faint) }

  /* ── Metadata footer ── */
  .meta-foot{
    margin:12px 14px 0;
    padding:14px 16px;
    border-radius:16px;
    background:var(--panel-solid); border:1px solid var(--line);
    display:grid; grid-template-columns:auto 1fr; gap:8px 16px;
  }
  .meta-foot .lab{
    font:500 9.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .meta-foot .val{
    font:500 11.5px var(--mono); color:var(--ink); letter-spacing:0.04em;
    font-variant-numeric:tabular-nums; text-align:right;
  }
  .state-pip{
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 7px; border-radius:5px;
    border:1px solid var(--line-2); background:rgba(255,255,255,0.04);
    color:var(--ink); font:500 9px var(--mono); letter-spacing:0.16em;
  }
  .state-pip[data-tone="anon"]{ color:var(--ink); border-color:var(--line-2) }
  .state-pip[data-tone="published"]{ color:#7fd0ff; border-color:rgba(62,167,255,0.4); background:rgba(62,167,255,0.08) }
  .state-pip[data-tone="draft"]{ color:#ffb95a; border-color:rgba(255,159,40,0.32); background:rgba(255,159,40,0.06) }
  .state-pip .dot{ width:6px; height:6px; border-radius:50%; background:currentColor }

  /* ── Action bar (bottom sticky) ── */
  .actionbar{
    position:absolute; left:0; right:0; bottom:0; z-index:25;
    padding:12px 14px calc(20px + env(safe-area-inset-bottom, 0px));
    background:linear-gradient(180deg, rgba(7,8,9,0) 0%, var(--bg) 35%);
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .secondary-cta{
    height:52px; border-radius:14px;
    background:var(--panel-hi); border:1px solid var(--line-2);
    color:var(--ink);
    font:600 13px var(--sans); cursor:pointer;
    transition:transform .18s; font-family:var(--sans);
  }
  .secondary-cta:active{ transform:scale(0.98) }
  .primary-cta{
    height:52px; border-radius:14px; border:0;
    background:var(--accent); color:#0a0c10;
    font:600 14px var(--sans); cursor:pointer;
    box-shadow:0 0 28px rgba(62,167,255,0.18);
    transition:transform .18s; font-family:var(--sans);
  }
  .primary-cta:active{ transform:scale(0.98) }
  .primary-cta[data-tone="warn"]{
    background:transparent; color:var(--live);
    border:1px solid rgba(255,77,77,0.4); box-shadow:none;
  }

  /* ── Confirm modal ── */
  .scrim{ position:absolute; inset:0; z-index:50;
    background:rgba(0,0,0,0.65); opacity:0; pointer-events:none;
    transition:opacity .25s; }
  .scrim[data-open="true"]{ opacity:1; pointer-events:auto }
  .modal{ position:absolute; left:14px; right:14px; bottom:14px; z-index:60;
    border-radius:24px; overflow:hidden;
    background:#0e1116; border:1px solid var(--line-2);
    transform:translateY(20px); opacity:0; pointer-events:none;
    transition:transform .3s cubic-bezier(.4,1.4,.6,1), opacity .25s;
  }
  .modal[data-open="true"]{ transform:translateY(0); opacity:1; pointer-events:auto }
  .modal .mh{ padding:18px 18px 8px; display:flex; gap:14px; align-items:flex-start }
  .modal .mh .ring{
    width:42px; height:42px; border-radius:50%;
    background:rgba(255,77,77,0.12); border:1px solid rgba(255,77,77,0.32);
    color:var(--live); display:grid; place-items:center; flex:none;
  }
  .modal .mh .ring svg{ width:20px;height:20px }
  .modal .mh .t{
    font:600 17px/1.25 var(--sans); letter-spacing:-0.01em; color:var(--ink); text-wrap:pretty;
  }
  .modal .mb{ padding:6px 18px 14px;
    font:500 12.5px/1.55 var(--sans); color:var(--ink-dim); text-wrap:pretty; }
  .modal .mb b{ color:var(--ink); font-weight:500 }
  .modal .check-row{
    margin:10px 18px 0; padding:11px 12px; border-radius:10px;
    background:rgba(255,255,255,0.04); border:1px solid var(--line);
    display:flex; align-items:flex-start; gap:10px;
  }
  .modal .check{
    width:18px; height:18px; border-radius:5px;
    border:1px solid var(--line-2); background:transparent;
    cursor:pointer; flex:none; display:grid; place-items:center;
    color:var(--bg); font-family:var(--sans); padding:0;
    transition:background .18s, border-color .18s;
  }
  .modal .check[data-on="true"]{ background:var(--live); border-color:var(--live) }
  .modal .check svg{ width:11px; height:11px }
  .modal .check-row .l{ font:500 12.5px/1.4 var(--sans); color:var(--ink-dim) }
  .modal .check-row .l b{ color:var(--ink); font-weight:500 }
  .modal .mfoot{
    padding:14px 14px 16px;
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .modal .cancel{
    height:46px; border-radius:12px;
    background:transparent; border:1px solid var(--line-2); color:var(--ink);
    font:600 13px var(--sans); cursor:pointer; font-family:var(--sans);
  }
  .modal .destroy{
    height:46px; border-radius:12px; border:0;
    background:var(--live); color:#fff;
    font:600 13px var(--sans); cursor:pointer; font-family:var(--sans);
    box-shadow:0 0 24px rgba(255,77,77,0.28);
    transition:opacity .2s;
  }
  .modal .destroy[disabled]{ opacity:0.32; cursor:not-allowed; box-shadow:none }

  /* ── Tweaks panel (state switcher) ── */
  .tweaks{ position:fixed; bottom:14px; right:14px; z-index:200;
    display:flex; flex-direction:column; gap:6px;
    padding:10px; border-radius:14px;
    background:var(--panel-solid); border:1px solid var(--line-2);
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
    font:500 10px var(--mono); letter-spacing:0.1em; color:var(--ink-dim);
    max-width:200px; }
  .tweaks .h{ color:var(--ink-faint); padding:2px 4px 4px; letter-spacing:0.16em; font-size:9px; }
  .tweaks button{ padding:6px 10px; border:1px solid var(--line);
    background:transparent; color:var(--ink-dim); border-radius:8px; cursor:pointer;
    font:500 10px var(--mono); letter-spacing:0.1em; font-family:var(--sans);
    text-align:left; }
  .tweaks button[data-on="true"]{ border-color:var(--accent); color:var(--ink);
    background:rgba(62,167,255,0.08); }
</style>
</head>
<body>
<div id="outer" style="width:100%;height:100%;display:grid;place-items:center"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  // ── Inline phone frame ──
  function IOSStatusBar(){
    const c='#fff';
    return (<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'21px 34px 19px',width:'100%',boxSizing:'border-box'}}>
      <span style={{fontFamily:'-apple-system,system-ui',fontWeight:590,fontSize:17,color:c}}>9:41</span>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
      </div></div>);
  }
  function IOSDevice({children}){
    return (<div style={{width:402,height:874,borderRadius:48,overflow:'hidden',position:'relative',background:'#000',boxShadow:'0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)',fontFamily:'-apple-system,system-ui,sans-serif'}}>
      <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10}}><IOSStatusBar/></div>
      <div style={{position:'absolute',inset:0}}>{children}</div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
        <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,0.7)'}}/>
      </div></div>);
  }
  function Shell({children}){
    const fit=()=>{const vh=window.innerHeight,vw=window.innerWidth;return Math.min(vw/(402+40),vh/(874+40),1);}
    const [s,setS]=React.useState(fit());
    React.useEffect(()=>{const on=()=>setS(fit());window.addEventListener("resize",on);return()=>window.removeEventListener("resize",on);},[]);
    return <div style={{transform:`scale(${s})`,transformOrigin:"center"}}><IOSDevice>{children}</IOSDevice></div>;
  }

  // ── Icons ──
  const I = {
    back:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
    play:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5z"/></svg>,
    pause:<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>,
    cam: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7h4l2-2h6l2 2h4v12H3z"/><circle cx="12" cy="13" r="3.5"/></svg>,
    mic: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>,
    loc: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21s-7-7-7-12a7 7 0 0 1 14 0c0 5-7 12-7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>,
    id:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>,
    gyro:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M5 9h14M9 5v14"/></svg>,
    kebab:<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>,
    trash:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>,
    scissors:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4L8.4 16M14 12l6 8M8 12l6-2"/></svg>,
    warning:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l10 18H2z"/><path d="M12 10v5M12 18h.01"/></svg>,
    info:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>,
    x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
    check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>,
  };

  const LAYER_DEFS = [
    { k:'cam',  ic:I.cam,  name:'Camera',   desc:'1080p · 23 MIN CAPTURED' },
    { k:'mic',  ic:I.mic,  name:'Audio',    desc:'48 KHZ STEREO · 23 MIN' },
    { k:'loc',  ic:I.loc,  name:'Location', desc:'BUSHWICK, BK · ROOFTOP' },
    { k:'id',   ic:I.id,   name:'ID',       desc:'@KAI.DC · BROADCASTER' },
    { k:'gyro', ic:I.gyro, name:'Gyro',     desc:'ORIENTATION · MOTION' },
  ];

  // ── 6 demo states ───────────────────────────────────────────
  // For each: layer state map ('on'|'off'|'deleted'), in/out (% of duration),
  //           tags, idAlertOpen (banner), modal (null|'delete-cam'|'delete-mic'|'trim'),
  //           publishState ('published'|'draft'|'anonymous'), dirty flag.
  const STATES = {
    default: {
      layers: { cam:'on', mic:'on', loc:'on', id:'on', gyro:'on' },
      trim: [0, 100], tags: ['rooftop','sunset'],
      modal:null, publish:'published', dirty:false,
    },
    midEdit: {
      layers: { cam:'on', mic:'on', loc:'on', id:'on', gyro:'off' },
      trim: [12, 88], tags: ['rooftop','sunset','drumline','bushwick'],
      modal:null, publish:'published', dirty:true,
    },
    anonymous: {
      layers: { cam:'off', mic:'on', loc:'off', id:'off', gyro:'off' },
      trim: [0, 100], tags: ['acoustic'],
      modal:null, publish:'anonymous', dirty:false,
    },
    deleteConfirm: {
      layers: { cam:'on', mic:'on', loc:'on', id:'on', gyro:'on' },
      trim: [0, 100], tags: ['rooftop','sunset'],
      modal:'delete-cam', publish:'published', dirty:false,
    },
    trimConfirm: {
      layers: { cam:'on', mic:'on', loc:'on', id:'on', gyro:'on' },
      trim: [12, 88], tags: ['rooftop','sunset','drumline'],
      modal:'trim', publish:'published', dirty:true,
    },
    postDeletion: {
      layers: { cam:'on', mic:'on', loc:'on', id:'on', gyro:'deleted' },
      trim: [0, 100], tags: ['rooftop','sunset'],
      modal:null, publish:'published', dirty:false,
    },
  };

  function fmtTime(pct, totalSec){
    const s = Math.round(pct/100 * totalSec);
    const m = Math.floor(s/60);
    const r = s % 60;
    return `${m}:${String(r).padStart(2,'0')}`;
  }

  // Build decorative waveform pattern — stable (seeded)
  const WF = Array.from({length:64}, (_,i) => {
    const v = (Math.sin(i*0.7)+Math.sin(i*1.9)*0.6+Math.sin(i*0.31)*0.4) * 0.5 + 0.5;
    return Math.round(v * 80 + 14);
  });

  function Preview({ layers, trim }){
    const camOn  = layers.cam === 'on';
    const micOn  = layers.mic === 'on';
    const locOn  = layers.loc === 'on';

    return (
      <div className="preview">
        {camOn ? (
          <>
            <div className="cam"/>
            <div className="grain"/>
          </>
        ) : locOn ? (
          <div className="map-fallback"><div className="pin"/></div>
        ) : (
          <div className="audio-fallback">
            <div className="wave">
              {Array.from({length:18}).map((_,i)=>(
                <i key={i} style={{animationDelay:`${i*0.07}s`, height:'14px'}}/>
              ))}
            </div>
            <span className="lab">{micOn ? 'AUDIO ONLY' : 'NO PREVIEW'}</span>
          </div>
        )}

        <div className="lay-overlay">
          {LAYER_DEFS.map(L => (
            <span key={L.k} className="l"
              data-on={layers[L.k] === 'on'}
              data-id={L.k === 'id'}
              data-deleted={layers[L.k] === 'deleted'}
            >{L.ic}</span>
          ))}
        </div>

        <span className="viewer-tag"><span className="eye"/>VIEWERS WILL SEE</span>

        <div className="ctlbar">
          <button className="pp" aria-label="Play">{I.play}</button>
          <div className="pbar">
            <div className="played"/>
            <div className="knob"/>
          </div>
          <span>0:09 / 0:23</span>
        </div>
      </div>
    );
  }

  function Timeline({ trim, onPermanentTrim }){
    const TOTAL = 23; // seconds (sample)
    const [a, b] = trim;
    const trimmed = (b-a) / 100 * TOTAL;
    const hasTrim = a > 0 || b < 100;
    const scrub = a + (b-a) * 0.45;

    return (
      <div className="timeline">
        <div className="tl-head">
          <span className="lab">TIMELINE</span>
          <span className="dur">
            <b>{fmtTime(b-a, TOTAL)}</b>
            {hasTrim && <span className="orig">{fmtTime(100, TOTAL)}</span>}
          </span>
        </div>

        <div className="track">
          <div className="wf">
            {WF.map((h,i) => (
              <i key={i} style={{height:`${Math.min(h, 80)}%`}}/>
            ))}
          </div>
          {a > 0 && <div className="trim-out" style={{left:0, width:`${a}%`}}/>}
          {b < 100 && <div className="trim-out" style={{left:`${b}%`, right:0}}/>}
          <div className="active" style={{left:`${a}%`, width:`${b-a}%`}}/>
          <div className="scrub" style={{left:`${scrub}%`}}/>
        </div>

        <div className="tl-foot">
          <span className="stamps">
            <span>IN<b>{fmtTime(a, TOTAL)}</b></span>
            <span>OUT<b>{fmtTime(b, TOTAL)}</b></span>
          </span>
          <button className="perm-cut" onClick={onPermanentTrim}>
            {I.scissors}<span>PERMANENT TRIM…</span>
          </button>
        </div>
      </div>
    );
  }

  function LayerRow({ L, status, onToggle, onDelete, idWillPublish }){
    const isOn      = status === 'on';
    const isDeleted = status === 'deleted';

    let pip = null;
    if(isDeleted) pip = <span className="pip">DATA DELETED</span>;
    else if(!isOn) pip = <span className="pip">CAPTURED · OFF</span>;
    else if(L.k === 'id' && idWillPublish) pip = <span className="pip" style={{color:'var(--accent)', borderColor:'rgba(62,167,255,0.4)', background:'rgba(62,167,255,0.08)'}}>PUBLIC</span>;
    else pip = <span className="pip">CAPTURED · ON</span>;

    let desc = L.desc;
    if(isDeleted) desc = 'PERMANENTLY DELETED · NOT RECOVERABLE';
    else if(L.k === 'id' && !isOn) desc = 'CLIP IS PRIVATE TO YOU';

    return (
      <div className="layer" data-on={isOn} data-deleted={isDeleted} data-key={L.k}>
        <div className="ic">{L.ic}</div>
        <div className="col">
          <div className="name">{L.name}{pip}</div>
          <div className="desc">{desc}</div>
        </div>
        <button
          className="toggle"
          data-on={isOn}
          disabled={isDeleted}
          onClick={onToggle}
          aria-label={`${L.name} toggle`}
        />
        <button className="row-menu" disabled={isDeleted} onClick={onDelete} aria-label="Layer options">
          {I.kebab}
        </button>
      </div>
    );
  }

  function ConfirmModal({ open, kind, layerName, onCancel, onConfirm }){
    const [acked, setAcked] = React.useState(false);
    React.useEffect(()=>{ if(open) setAcked(false); }, [open, kind]);

    if(!kind) return <><div className="scrim" data-open={open} onClick={onCancel}/><div className="modal" data-open={false}/></>;

    const isTrim = kind === 'trim';
    const t = isTrim
      ? 'Permanently cut heads & tails?'
      : `Permanently delete ${layerName} data?`;
    const body = isTrim ? (
      <>
        Removes the trimmed portions from the underlying capture. The cut footage is <b>gone forever</b>.
        <br/><br/>
        Setting in/out points without permanent trim is non-destructive — you can revise them anytime.
      </>
    ) : (
      <>
        Deletes the captured <b>{layerName.toLowerCase()}</b> data permanently. This is different from toggling the layer off — toggled data stays on Wrld and can be re-enabled.
        <br/><br/>
        Once deleted, this layer can never be added back to this clip.
      </>
    );
    const ackText = isTrim
      ? <>I understand the cut footage is gone forever.</>
      : <>I understand this <b>{layerName.toLowerCase()}</b> data will be deleted forever.</>;

    return (
      <>
        <div className="scrim" data-open={open} onClick={onCancel}/>
        <div className="modal" data-open={open} role="alertdialog">
          <div className="mh">
            <span className="ring">{I.warning}</span>
            <span className="t">{t}</span>
          </div>
          <div className="mb">{body}</div>
          <div className="check-row">
            <button className="check" data-on={acked} onClick={()=>setAcked(v=>!v)} aria-label="Acknowledge">
              {acked && I.check}
            </button>
            <span className="l">{ackText}</span>
          </div>
          <div className="mfoot">
            <button className="cancel" onClick={onCancel}>Keep it</button>
            <button className="destroy" disabled={!acked} onClick={onConfirm}>
              {isTrim ? 'Cut permanently' : 'Delete forever'}
            </button>
          </div>
        </div>
      </>
    );
  }

  function App(){
    const [demoKey, setDemoKey] = React.useState('default');
    const [state, setState]     = React.useState(STATES.default);

    React.useEffect(() => { setState(STATES[demoKey]); }, [demoKey]);

    const setLayer = (k, val) => {
      setState(s => ({ ...s, layers: { ...s.layers, [k]: val }, dirty:true }));
    };

    const toggleLayer = (k) => {
      const cur = state.layers[k];
      if(cur === 'deleted') return;
      setLayer(k, cur === 'on' ? 'off' : 'on');
    };

    const layers = state.layers;
    const tags   = state.tags;

    // ID transition logic
    const idWasOff   = demoKey === 'anonymous';
    const idIsOnNow  = layers.id === 'on';
    const showIdToPublic = idWasOff && idIsOnNow;
    const isAnon = !idIsOnNow && layers.id !== 'deleted';

    // Publish state pip
    const pubTone = layers.id === 'on' ? 'published' : 'anon';
    const pubLabel = layers.id === 'on'
      ? 'PUBLISHED'
      : 'PRIVATE · ONLY YOU';

    return (
      <div className="phone-root">
        <div className="topbar">
          <button className="iconbtn">{I.back}</button>
          <div>
            <div className="title">Edit clip</div>
            <div className="sub">APR 21 · BUSHWICK ROOFTOP · 23 SEC</div>
          </div>
          <button className="save-btn" data-dirty={state.dirty}>
            {state.dirty ? 'SAVE' : 'SAVED'}
          </button>
        </div>

        <div className="scroll">
          <Preview layers={layers} trim={state.trim}/>

          <Timeline trim={state.trim} onPermanentTrim={()=>setState(s=>({...s, modal:'trim'}))}/>

          {/* ID transition banner — anonymous → about to publish */}
          {isAnon && (
            <div className="vis-banner">
              <span className="ic">{I.lock || I.warning}</span>
              <div className="col">
                <span className="t">This clip is private to you</span>
                <span className="d">
                  ID was off during broadcast, so this clip <b>doesn't appear on your public profile</b>.
                  Toggle <b>ID</b> below to publish it under @kai.dc.
                </span>
              </div>
            </div>
          )}
          {showIdToPublic && (
            <div className="vis-banner acc">
              <span className="ic">{I.info}</span>
              <div className="col">
                <span className="t">Saving will publish this clip under @kai.dc</span>
                <span className="d">
                  This was an anonymous clip. Turning ID on makes it <b>publicly attributable to you</b>. You can switch it back any time.
                </span>
              </div>
            </div>
          )}

          <div className="sec-h">
            <span>LAYERS</span>
            <span className="r">{Object.values(layers).filter(s=>s==='on').length} OF {LAYER_DEFS.length} ON</span>
          </div>
          <div className="layers">
            {LAYER_DEFS.map(L => (
              <LayerRow
                key={L.k}
                L={L}
                status={layers[L.k]}
                onToggle={()=>toggleLayer(L.k)}
                onDelete={()=>setState(s=>({...s, modal:`delete-${L.k}`}))}
                idWillPublish={showIdToPublic && L.k === 'id'}
              />
            ))}
          </div>

          <div className="sec-h">
            <span>TAGS</span>
            <span className="r">{tags.length} · SEARCH + DISCOVERY</span>
          </div>
          <div className="tags-card">
            {tags.map(t => (
              <span key={t} className="tag">
                {t}
                <button className="x" aria-label={`Remove ${t}`}>{I.x}</button>
              </span>
            ))}
            <input className="tag-input" placeholder={tags.length === 0 ? 'Add tags…' : '+ tag'}/>
          </div>

          <div className="sec-h"><span>METADATA</span></div>
          <div className="meta-foot">
            <span className="lab">BROADCAST</span>
            <span className="val">APR 21, 2026 · 21:14</span>
            <span className="lab">VENUE</span>
            <span className="val">{layers.loc === 'on' ? 'BUSHWICK ROOFTOP, BK' : '—'}</span>
            <span className="lab">CAPTURED</span>
            <span className="val">0:23</span>
            <span className="lab">PEAK LIVE</span>
            <span className="val">3,124 VIEWERS</span>
            <span className="lab">STATE</span>
            <span className="val">
              <span className="state-pip" data-tone={pubTone}>
                <span className="dot"/>{pubLabel}
              </span>
            </span>
          </div>
        </div>

        <div className="actionbar">
          <button className="secondary-cta">
            {isAnon ? 'Save' : 'Unpublish'}
          </button>
          <button className="primary-cta" data-tone={null}>
            {isAnon ? 'Publish to profile' : showIdToPublic ? 'Publish to profile' : 'Save changes'}
          </button>
        </div>

        {/* Confirm modals */}
        <ConfirmModal
          open={!!state.modal}
          kind={state.modal === 'trim' ? 'trim'
              : state.modal && state.modal.startsWith('delete-') ? 'delete' : null}
          layerName={
            state.modal && state.modal.startsWith('delete-')
              ? (LAYER_DEFS.find(L => L.k === state.modal.slice(7))?.name || '')
              : ''
          }
          onCancel={()=>setState(s=>({...s, modal:null}))}
          onConfirm={()=>{
            if(state.modal && state.modal.startsWith('delete-')){
              const k = state.modal.slice(7);
              setLayer(k, 'deleted');
            }
            setState(s => ({...s, modal:null, dirty:true}));
          }}
        />

        <div className="tweaks">
          <div className="h">DEMO STATE</div>
          <button data-on={demoKey==='default'}       onClick={()=>setDemoKey('default')}>1 · DEFAULT</button>
          <button data-on={demoKey==='midEdit'}       onClick={()=>setDemoKey('midEdit')}>2 · MID-EDIT</button>
          <button data-on={demoKey==='anonymous'}     onClick={()=>setDemoKey('anonymous')}>3 · ANONYMOUS</button>
          <button data-on={demoKey==='deleteConfirm'} onClick={()=>setDemoKey('deleteConfirm')}>4 · DELETE LAYER</button>
          <button data-on={demoKey==='trimConfirm'}   onClick={()=>setDemoKey('trimConfirm')}>5 · PERM. TRIM</button>
          <button data-on={demoKey==='postDeletion'}  onClick={()=>setDemoKey('postDeletion')}>6 · POST-DELETION</button>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('outer')).render(<Shell><App/></Shell>);
</script>
</body>
</html>
