<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wrld — Viewer Sheet</title>
<style>
  /* Tokens */
  @import url("https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");
  :root{
    --bg:#070809; --bg-2:#0c0e11;
    --panel:rgba(20,22,26,0.72); --panel-solid:#14171c; --panel-hi:#1a1e24;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
    --ink:#ece9e2; --ink-dim:rgba(236,233,226,0.58); --ink-faint:rgba(236,233,226,0.34);
    --accent:#3ea7ff; --accent-hot:#7fd0ff; --accent-glow:rgba(62,167,255,0.45);
    --live:#ff4d4d; --live-glow:rgba(255,77,77,0.45);
    --sans:"Inter Tight", ui-sans-serif, system-ui, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0a0b;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{display:grid;place-items:center;overflow:hidden}

  .phone-root{ width:402px; height:874px; position:relative; overflow:hidden;
    background:#000; color:var(--ink); }

  /* ── Globe background context (so the sheet has something to sit on) ── */
  .canvas-bg{
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(900px 700px at 50% 35%, #1a2030 0%, #0b0d11 60%, #050608 100%);
  }
  .globe{
    position:absolute; left:50%; top:280px; transform:translateX(-50%);
    width:560px; height:560px; border-radius:50%;
    background:
      radial-gradient(40% 50% at 30% 30%, rgba(62,167,255,0.35), transparent 60%),
      radial-gradient(60% 70% at 70% 70%, rgba(20,30,55,0.9), transparent 60%),
      radial-gradient(circle at 50% 50%, #1a2230 0%, #0a0e16 70%);
    box-shadow:0 0 120px rgba(62,167,255,0.18), inset -40px -50px 120px rgba(0,0,0,0.6);
    opacity:0.6;
  }
  .dot{
    position:absolute; width:8px; height:8px; border-radius:50%;
    background:var(--live); box-shadow:0 0 12px var(--live-glow);
  }
  .dot.acc{ background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  .scrim{
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,0.55) 100%);
    transition:opacity .25s;
  }
  .scrim[data-open="true"]{ opacity:1 }

  /* ── Top status strip ── */
  .topstrip{
    position:absolute; top:54px; left:14px; right:14px; z-index:5;
    height:32px; padding:0 12px;
    display:flex; align-items:center; gap:10px;
    border-radius:10px;
    background:var(--panel); border:1px solid var(--line);
    backdrop-filter:blur(12px);
    font:500 10.5px var(--mono); color:var(--ink-dim); letter-spacing:0.12em;
  }
  .topstrip .live-dot{
    width:7px; height:7px; border-radius:50%; background:var(--live);
    box-shadow:0 0 10px var(--live-glow);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.45} }
  .topstrip b{ color:var(--ink); font-weight:500 }

  /* ── Backdrop tap-to-close ── */
  .sheet-bg{
    position:absolute; inset:0; z-index:10;
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .sheet-bg[data-open="true"]{ opacity:1; pointer-events:auto }

  /* ── The sheet itself ── */
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:20;
    background:#0e1116;
    border-top-left-radius:26px; border-top-right-radius:26px;
    border-top:1px solid var(--line-2);
    box-shadow:0 -20px 60px rgba(0,0,0,0.6);
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.4,1.4,.6,1);
    will-change:transform;
    display:flex; flex-direction:column;
    max-height:calc(100% - 86px);
  }
  .sheet[data-open="true"]{ transform:translateY(0) }

  .grabber{
    width:48px; height:5px; border-radius:999px;
    background:var(--line-2);
    margin:8px auto 0;
    flex:none;
  }

  /* Pinned video preview */
  .preview{
    margin:14px 14px 0; flex:none;
    aspect-ratio: 16 / 10;
    border-radius:18px;
    position:relative; overflow:hidden;
    background:
      radial-gradient(60% 80% at 30% 80%, rgba(255,160,90,0.28), transparent 60%),
      radial-gradient(40% 50% at 80% 30%, rgba(62,167,255,0.25), transparent 70%),
      linear-gradient(180deg, #1d1410, #0a0a0c);
    border:1px solid var(--line);
  }
  .preview .grain{
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay; pointer-events:none;
  }
  .preview .live-pill{
    position:absolute; top:12px; left:12px;
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 9px 5px 7px; border-radius:8px;
    background:var(--live); color:#fff;
    font:600 9px var(--mono); letter-spacing:0.16em;
  }
  .preview .live-pill .sq{
    width:8px; height:8px; border-radius:2px; background:#fff;
    animation:pulse 1.6s ease-in-out infinite;
  }
  .preview .vmeta{
    position:absolute; right:12px; top:12px;
    display:inline-flex; align-items:center; gap:5px;
    padding:5px 8px; border-radius:8px;
    background:rgba(0,0,0,0.55); border:1px solid var(--line-2);
    backdrop-filter:blur(8px);
    color:var(--ink); font:500 10px var(--mono); letter-spacing:0.06em;
    font-variant-numeric:tabular-nums;
  }
  .preview .channel{
    position:absolute; left:12px; bottom:12px;
    font:500 10px var(--mono); letter-spacing:0.16em;
    color:var(--ink); opacity:0.85;
  }
  .preview .play{
    position:absolute; inset:0; display:grid; place-items:center;
    background:transparent; border:0; cursor:pointer;
  }
  .preview .play span{
    width:54px; height:54px; border-radius:50%;
    background:rgba(0,0,0,0.45); border:1px solid var(--line-2);
    backdrop-filter:blur(8px);
    display:grid; place-items:center;
    transition:transform .2s, background .2s;
  }
  .preview .play:active span{ transform:scale(0.94); background:rgba(0,0,0,0.6) }

  /* Sheet body — scrollable */
  .body{
    overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
    padding:14px 18px 22px;
    flex:1 1 auto; min-height:0;
  }
  .body::-webkit-scrollbar{display:none}

  .titleblock{
    display:flex; flex-direction:column; gap:6px;
    padding:14px 0 10px;
  }
  .titleblock .title{
    font:600 22px/1.2 var(--sans); letter-spacing:-0.02em; color:var(--ink);
    text-wrap:pretty;
  }
  .titleblock .where{
    font:500 11px var(--mono); color:var(--ink-dim); letter-spacing:0.08em;
    display:flex; align-items:center; gap:8px;
  }
  .titleblock .where .pin{ color:var(--ink-faint) }

  /* Coord HUD */
  .hud{
    display:grid; grid-template-columns:auto 1fr auto 1fr; gap:6px 14px;
    padding:12px 0 4px;
    margin-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .hud .lab{ font:500 9.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em }
  .hud .val{ font:500 11.5px var(--mono); color:var(--ink); letter-spacing:0.04em;
    font-variant-numeric:tabular-nums; }

  /* Broadcaster row */
  .bcaster{
    margin-top:14px;
    display:flex; align-items:center; gap:12px;
  }
  .av{
    width:42px; height:42px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd6a3 0%, #d68957 40%, #6b3a1d 100%);
    display:grid; place-items:center;
    font:600 16px var(--sans); color:#2b1a0a;
    border:1px solid var(--line-2); flex:none;
  }
  .bcaster .col{ display:flex; flex-direction:column; gap:2px; min-width:0; flex:1 }
  .bcaster .name{ font:600 14px var(--sans); letter-spacing:-0.005em; color:var(--ink) }
  .bcaster .alias{ font:500 10.5px var(--mono); color:var(--ink-dim); letter-spacing:0.06em }
  .bcaster .follow{
    flex:none; height:32px; padding:0 14px; border-radius:999px;
    background:var(--accent); color:#0a0c10; border:0;
    font:600 12px var(--sans); cursor:pointer;
    transition:transform .18s;
    font-family:var(--sans);
  }
  .bcaster .follow:active{ transform:scale(0.96) }
  .bcaster .follow[data-following="true"]{
    background:transparent; color:var(--ink); border:1px solid var(--line-2);
  }

  /* Streams strip */
  .strip-head{
    margin-top:18px;
    display:flex; align-items:baseline; justify-content:space-between;
    font:500 10.5px var(--mono); color:var(--ink-faint); letter-spacing:0.14em;
  }
  .streams{
    margin-top:10px;
    display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
    padding-bottom:2px;
  }
  .streams::-webkit-scrollbar{display:none}
  .stream{
    flex:none;
    min-width:84px;
    padding:10px 12px 11px;
    border-radius:14px;
    background:var(--panel-solid); border:1px solid var(--line);
    display:flex; flex-direction:column; gap:6px; align-items:flex-start;
    cursor:pointer; transition:border-color .2s;
  }
  .stream[data-on="true"]{ border-color:rgba(62,167,255,0.4) }
  .stream[data-on="false"]{ opacity:0.45 }
  .stream .ic{
    width:28px; height:28px; border-radius:8px;
    background:rgba(255,255,255,0.04); border:1px solid var(--line);
    display:grid; place-items:center; color:var(--ink-dim);
  }
  .stream[data-on="true"] .ic{ color:var(--accent) }
  .stream .lab{ font:500 9px var(--mono); letter-spacing:0.14em; color:var(--ink-dim) }
  .stream[data-on="true"] .lab{ color:var(--ink) }
  .stream .ct{ font:500 10.5px var(--mono); color:var(--ink); letter-spacing:0.04em;
    font-variant-numeric:tabular-nums; }

  /* Action bar — primary CTA */
  .actionbar{
    flex:none;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top:1px solid var(--line);
    background:#0e1116;
    display:grid; grid-template-columns:48px 1fr 48px; gap:8px;
  }
  .iconbtn{
    width:48px; height:48px; border-radius:14px;
    background:var(--panel-hi); border:1px solid var(--line);
    color:var(--ink-dim); display:grid; place-items:center;
    cursor:pointer; transition:color .2s, background .2s, transform .18s;
    font-family:var(--sans);
  }
  .iconbtn:active{ transform:scale(0.95) }
  .iconbtn[data-on="true"]{ color:var(--live); border-color:rgba(255,77,77,0.4) }
  .open-full{
    height:48px; border-radius:14px; border:0;
    background:var(--accent); color:#0a0c10;
    font:600 14px var(--sans); letter-spacing:-0.005em;
    cursor:pointer; transition:transform .18s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow:0 0 28px rgba(62,167,255,0.16);
    font-family:var(--sans);
  }
  .open-full:active{ transform:scale(0.98) }

  /* Drag affordance state */
  .sheet[data-mini="true"]{
    transform:translateY(calc(100% - 320px));
  }
</style>
</head>
<body>
<div id="outer" style="width:100%;height:100%;display:grid;place-items:center"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  // ── Inline phone frame ──
  function IOSStatusBar(){
    const c = '#fff';
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'21px 34px 19px',width:'100%',boxSizing:'border-box'}}>
        <span style={{fontFamily:'-apple-system,system-ui',fontWeight:590,fontSize:17,color:c}}>9:41</span>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
        </div>
      </div>
    );
  }
  function IOSDevice({ children }){
    return (
      <div style={{width:402,height:874,borderRadius:48,overflow:'hidden',position:'relative',background:'#000',boxShadow:'0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.5)',fontFamily:'-apple-system,system-ui,sans-serif'}}>
        <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10}}><IOSStatusBar/></div>
        <div style={{position:'absolute',inset:0}}>{children}</div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:60,height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',paddingBottom:8,pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,0.7)'}}/>
        </div>
      </div>
    );
  }
  function Shell({ children }){
    const fit = () => {
      const vh = window.innerHeight, vw = window.innerWidth;
      return Math.min(vw/(402+40), vh/(874+40), 1);
    };
    const [s, setS] = React.useState(fit());
    React.useEffect(() => {
      const on = () => setS(fit());
      window.addEventListener("resize", on);
      return () => window.removeEventListener("resize", on);
    }, []);
    return (
      <div style={{transform:`scale(${s})`,transformOrigin:"center"}}>
        <IOSDevice>{children}</IOSDevice>
      </div>
    );
  }

  // ── Icons ──
  const I = {
    play:  <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M8 5.5v13l11-6.5z"/></svg>,
    pin:   <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21s-7-7-7-12a7 7 0 0 1 14 0c0 5-7 12-7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>,
    eye:   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>,
    cam:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7h4l2-2h6l2 2h4v12H3z"/><circle cx="12" cy="13" r="3.5"/></svg>,
    mic:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>,
    loc:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>,
    gyro:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M5 9h14M9 5v14"/></svg>,
    comp:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5L13 13l-3.5 1.5L11 11z" fill="currentColor"/></svg>,
    save:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M5 3h14l-2 4H7zM7 7h10v14l-5-3-5 3z"/></svg>,
    share: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v14M6 9l6-6 6 6"/><path d="M5 21h14"/></svg>,
    expand:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>,
  };

  const STREAMS = [
    { k:'cam',  on:true,  ic:I.cam,  lab:'CAM',  ct:'1080p' },
    { k:'mic',  on:true,  ic:I.mic,  lab:'AUDIO', ct:'48 kHz' },
    { k:'loc',  on:true,  ic:I.loc,  lab:'LOC',   ct:'GPS' },
    { k:'gyro', on:false, ic:I.gyro, lab:'GYRO',  ct:'OFF' },
    { k:'comp', on:true,  ic:I.comp, lab:'CMP',   ct:'192°' },
  ];

  function Sheet({ open, onClose, onOpenFull }){
    const [saved, setSaved] = React.useState(false);
    const [following, setFollowing] = React.useState(false);

    return (
      <>
        <div className="sheet-bg" data-open={open} onClick={onClose}/>
        <div className="sheet" data-open={open} role="dialog" aria-label="Broadcast preview">
          <div className="grabber"/>

          <div className="preview">
            <div className="grain"/>
            <span className="live-pill"><span className="sq"/>LIVE</span>
            <span className="vmeta"><span style={{display:'inline-grid',placeItems:'center'}}>{I.eye}</span>1.4K</span>
            <span className="channel">CH 12 · STREET</span>
            <button className="play" aria-label="Play preview"><span>{I.play}</span></button>
          </div>

          <div className="body">
            <div className="titleblock">
              <div className="title">Atlantic Ave · street fest, drumline forming up</div>
              <div className="where">
                <span className="pin" style={{display:'inline-grid',placeItems:'center'}}>{I.pin}</span>
                <span>BROOKLYN, NY · 0.4 MI</span>
              </div>
            </div>

            <div className="hud">
              <span className="lab">LAT</span><span className="val">40.6829° N</span>
              <span className="lab">LON</span><span className="val">73.9772° W</span>
              <span className="lab">ELEV</span><span className="val">12 M</span>
              <span className="lab">UPTIME</span><span className="val">00:24:11</span>
            </div>

            <div className="bcaster">
              <div className="av">K</div>
              <div className="col">
                <div className="name">Kai DC</div>
                <div className="alias">@kai.dc · 1.2K followers</div>
              </div>
              <button
                className="follow"
                data-following={following}
                onClick={()=>setFollowing(v=>!v)}
              >{following ? 'Following' : 'Follow'}</button>
            </div>

            <div className="strip-head">
              <span>STREAMS</span>
              <span style={{color:'var(--ink-dim)'}}>{STREAMS.filter(s=>s.on).length} OF {STREAMS.length}</span>
            </div>
            <div className="streams">
              {STREAMS.map(s => (
                <div key={s.k} className="stream" data-on={s.on}>
                  <span className="ic">{s.ic}</span>
                  <span className="lab">{s.lab}</span>
                  <span className="ct">{s.ct}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="actionbar">
            <button
              className="iconbtn" data-on={saved}
              onClick={()=>setSaved(v=>!v)} aria-label="Save"
            >{I.save}</button>
            <button className="open-full" onClick={onOpenFull}>
              <span style={{display:'inline-grid',placeItems:'center'}}>{I.expand}</span>
              Open broadcast
            </button>
            <button className="iconbtn" aria-label="Share">{I.share}</button>
          </div>
        </div>
      </>
    );
  }

  function App(){
    const [open, setOpen] = React.useState(true);

    return (
      <div className="phone-root">
        <div className="canvas-bg"/>
        <div className="globe"/>
        {/* a few dots to suggest other broadcasts */}
        <span className="dot"     style={{top:340, left:140}}/>
        <span className="dot acc" style={{top:300, left:260}}/>
        <span className="dot acc" style={{top:420, left:200}}/>
        <span className="dot"     style={{top:240, left:230}}/>
        <span className="dot acc" style={{top:480, left:300}}/>

        <div className="topstrip">
          <span className="live-dot"/>
          <span><b>147</b> LIVE NOW</span>
          <span style={{marginLeft:'auto', color:'var(--ink-faint)'}}>BROOKLYN</span>
        </div>

        <div className="scrim" data-open={open}/>

        <Sheet
          open={open}
          onClose={()=>setOpen(false)}
          onOpenFull={()=>{ /* would navigate to Broadcast Live */ }}
        />

        {/* re-open helper if user dismisses */}
        {!open && (
          <button
            onClick={()=>setOpen(true)}
            style={{
              position:'absolute', bottom:30, left:'50%', transform:'translateX(-50%)',
              zIndex:30, padding:'12px 18px', borderRadius:999,
              background:'var(--panel)', border:'1px solid var(--line-2)',
              backdropFilter:'blur(10px)', color:'var(--ink-dim)',
              font:'500 11px var(--mono)', letterSpacing:'0.12em',
              cursor:'pointer', fontFamily:'var(--sans)'
            }}>REOPEN SHEET</button>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('outer')).render(
    <Shell><App/></Shell>
  );
</script>
</body>
</html>
